<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bubble Shooter · Бесконечный режим</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', cursive, sans-serif;
        }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #ff9a9e, #fad0c4, #fad0c4);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: none;
            bottom: -100px;
            animation: rise 8s infinite ease-in;
        }
        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0.8; }
            100% { transform: translateY(-120vh) scale(1.5); opacity: 0; }
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3), inset 0 0 20px rgba(255, 255, 255, 0.5);
            padding: 40px 30px;
            width: 100%;
            max-width: 500px;
            color: #2c3e50;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.5);
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 30px;
            background: linear-gradient(45deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .message {
            font-size: 2rem;
            margin: 40px 0;
            color: #2c3e50;
        }
        .btn {
            display: inline-block;
            width: 100%;
            padding: 15px 20px;
            font-size: 1.8rem;
            font-weight: bold;
            border: none;
            border-radius: 60px;
            background: linear-gradient(145deg, #f1c40f, #e67e22);
            color: white;
            text-shadow: 2px 2px 0 #b45d1a;
            box-shadow: 0 10px 0 #b45d1a;
            cursor: pointer;
            transition: 0.1s;
            margin-top: 20px;
            text-decoration: none;
        }
        .btn:active {
            transform: translateY(10px);
            box-shadow: none;
        }
        .btn.secondary {
            background: linear-gradient(145deg, #34495e, #2c3e50);
            box-shadow: 0 10px 0 #1a252f;
            text-shadow: 2px 2px 0 #1a252f;
        }
        .loading {
            font-size: 1.5rem;
            color: white;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div id="bubbles-container"></div>
    <div class="glass-panel" id="app">
        <div class="loading">Загрузка...</div>
    </div>

    <script>
        // Firebase конфигурация (такая же, как в других файлах)
        const firebaseConfig = {
            apiKey: "AIzaSyAb0WLf9uyTXhs6eGw19i_42gUIZZCbP9c",
            authDomain: "bubble-shooter-game-6169e.firebaseapp.com",
            projectId: "bubble-shooter-game-6169e",
            storageBucket: "bubble-shooter-game-6169e.firebasestorage.app",
            messagingSenderId: "260116679476",
            appId: "1:260116679476:web:bf0b75316ce263d483f361"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Генерация пузырьков фона
        (function createBubbles() {
            const container = document.getElementById('bubbles-container');
            for (let i = 0; i < 15; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                const size = Math.random() * 100 + 30;
                bubble.style.width = size + 'px';
                bubble.style.height = size + 'px';
                bubble.style.left = Math.random() * 100 + '%';
                bubble.style.animationDelay = Math.random() * 5 + 's';
                bubble.style.animationDuration = Math.random() * 5 + 8 + 's';
                container.appendChild(bubble);
            }
        })();

        const appDiv = document.getElementById('app');

        // Проверка авторизации
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            // Пользователь авторизован, показываем заглушку
            appDiv.innerHTML = `
                <h1>♾️ Бесконечный режим</h1>
                <div class="message">
                    🚧 В разработке<br>
                    Скоро здесь появится бесконечная игра с рекордами!
                </div>
                <button class="btn secondary" id="backBtn">← Назад в меню</button>
            `;

            document.getElementById('backBtn').addEventListener('click', () => {
                window.location.href = 'index.html';
            });
        });
    </script>
</body>
</html>
