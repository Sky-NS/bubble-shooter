<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bubble Shooter · Бесконечный режим</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #ff9a9e, #fad0c4, #fad0c4);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: none;
            bottom: -100px;
            animation: rise 8s infinite ease-in;
        }
        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0.8; }
            100% { transform: translateY(-120vh) scale(1.5); opacity: 0; }
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3), inset 0 0 20px rgba(255, 255, 255, 0.5);
            padding: 20px 20px;
            width: 100%;
            max-width: 500px;
            color: #2c3e50;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.5);
        }
        .game-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: rgba(0,0,0,0.2);
            border-radius: 30px;
            padding: 8px 12px;
            margin-bottom: 15px;
            font-weight: bold;
            color: #2c3e50;
        }
        .header-score {
            font-size: 1.4rem;
            color: #f39c12;
        }
        .header-record {
            font-size: 1rem;
            color: #3498db;
        }
        .powerup-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin: 10px 0;
        }
        .powerup-canvas {
            width: 60px;
            height: 60px;
            cursor: pointer;
            border-radius: 50%;
            background: rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        .powerup-canvas:hover {
            transform: scale(1.05);
        }
        .queue-circle {
            width: 100px;
            height: 140px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            position: relative;
            cursor: pointer;
            padding: 10px 0;
        }
        .queue-ball {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            transition: all 0.3s;
            background-size: cover;
            background-position: center;
        }
        .queue-ball.top {
            border: 3px solid gold;
        }
        .queue-ball.bottom {
            opacity: 0.5;
            border: 2px solid #aaa;
        }
        .queue-ball.bottom:hover {
            opacity: 0.8;
            transform: scale(1.1);
        }
        canvas {
            background: transparent;
            border-radius: 30px;
            display: block;
            width: 100%;
            height: auto;
            border: 3px solid rgba(255,255,255,0.3);
            touch-action: none;
        }
        .btn {
            display: inline-block;
            width: 100%;
            padding: 14px 20px;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            border-radius: 40px;
            background: linear-gradient(145deg, #f1c40f, #e67e22);
            color: white;
            text-shadow: 2px 2px 0 #b45d1a;
            box-shadow: 0 8px 0 #b45d1a;
            cursor: pointer;
            transition: 0.1s;
            margin-top: 15px;
        }
        .btn:active {
            transform: translateY(8px);
            box-shadow: none;
        }
        .btn.secondary {
            background: linear-gradient(145deg, #34495e, #2c3e50);
            box-shadow: 0 8px 0 #1a252f;
            text-shadow: 2px 2px 0 #1a252f;
        }
        .loading {
            text-align: center;
            font-size: 1.5rem;
            color: white;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div id="bubbles-container"></div>
    <div class="glass-panel" id="app">
        <div class="loading">Загрузка бесконечного режима...</div>
    </div>

    <script>
        // Firebase конфигурация
        const firebaseConfig = {
            apiKey: "AIzaSyAb0WLf9uyTXhs6eGw19i_42gUIZZCbP9c",
            authDomain: "bubble-shooter-game-6169e.firebaseapp.com",
            projectId: "bubble-shooter-game-6169e",
            storageBucket: "bubble-shooter-game-6169e.firebasestorage.app",
            messagingSenderId: "260116679476",
            appId: "1:260116679476:web:bf0b75316ce263d483f361"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;

        // Глобальные переменные игры
        let gameActive = false;
        let gameCanvas, ctx;
        let gameInterval;

        // Настройки сетки с увеличенным радиусом
        const COLS = 9;
        const ROWS = 12;
        const BALL_RADIUS = 22; // увеличено
        const CELL_W = BALL_RADIUS * 2; // 44
        const CELL_H = 40; // примерно 1.8 * 22 = 39.6, округлили для целочисленности
        const X_OFFSET = BALL_RADIUS; // 22
        const COLOR_NAMES = {
            '#e67e22': 'orange',
            '#3498db': 'blue',
            '#2ecc71': 'green',
            '#e74c3c': 'red',
            '#9b59b6': 'purple'
        };
        const COLORS = Object.keys(COLOR_NAMES);

        const ballImages = {};

        function loadImages() {
            return new Promise((resolve) => {
                let loadedCount = 0;
                const total = COLORS.length;
                COLORS.forEach(color => {
                    const img = new Image();
                    const fileName = COLOR_NAMES[color] + '.png';
                    img.src = 'images/' + fileName;
                    img.onload = () => {
                        ballImages[color] = img;
                        loadedCount++;
                        if (loadedCount === total) resolve();
                    };
                    img.onerror = () => {
                        console.warn('Не удалось загрузить изображение:', fileName);
                        loadedCount++;
                        if (loadedCount === total) resolve();
                    };
                });
            });
        }

        const SHOTS_PER_NEW_ROW = 5;
        const MAX_TRAJECTORY_LENGTH = 350;
        const BOMB_THRESHOLD = 100;        // шаров для получения клубка
        const RAINBOW_THRESHOLD = 50;       // шаров для получения универсального шара
        const BALL_SPEED = 6;               // увеличена с 5 до 6 (+20%)

        let grid = [];
        let startOffset = 0;
        let shotsFired = 0;
        let ballQueue = [];                  // только 2 элемента
        let shooting = false;
        let ball = { active: false };

        let dyingBalls = [];

        let aiming = false;
        let aimX = 0, aimY = 0;

        let gameScore = 0;
        let gameCombo = 0;
        let currentRecord = 0;

        // Переменные для клубка
        let bombCharge = 0;
        let bombAvailable = false;
        let bombActive = false;

        // Переменные для универсального шара
        let rainbowCharge = 0;
        let rainbowAvailable = false;
        let rainbowActive = false;

        // Переменные для анимации пульсации
        let pulsePhase = 0;

        // Отрисовка прогресса для клубка
        let bombCtx, bombCanvas;
        function initBombCanvas() {
            bombCanvas = document.getElementById('bombCanvas');
            if (bombCanvas) {
                bombCtx = bombCanvas.getContext('2d');
            }
        }

        function drawBombProgress() {
            if (!bombCtx || !bombCanvas) return;
            const w = bombCanvas.width;
            const h = bombCanvas.height;
            bombCtx.clearRect(0, 0, w, h);

            bombCtx.beginPath();
            bombCtx.arc(w/2, h/2, w/2 - 4, 0, 2 * Math.PI);
            bombCtx.fillStyle = '#333';
            bombCtx.fill();
            bombCtx.strokeStyle = '#555';
            bombCtx.lineWidth = 2;
            bombCtx.stroke();

            let progressColor;
            if (bombActive) {
                progressColor = '#FFD700'; // золотой
            } else if (bombAvailable) {
                progressColor = '#e74c3c'; // красный
            } else {
                progressColor = '#95a5a6'; // серый
            }

            let alpha = 1.0;
            if (bombAvailable && !bombActive) {
                alpha = 0.2 + 0.8 * (Math.sin(pulsePhase) * 0.5 + 0.5);
            }

            const percent = bombCharge / BOMB_THRESHOLD;
            if (percent > 0) {
                bombCtx.beginPath();
                bombCtx.moveTo(w/2, h/2);
                bombCtx.arc(w/2, h/2, w/2 - 4, -Math.PI/2, -Math.PI/2 + 2 * Math.PI * percent);
                bombCtx.closePath();
                bombCtx.fillStyle = progressColor;
                bombCtx.globalAlpha = alpha;
                bombCtx.fill();
                bombCtx.globalAlpha = 1.0;
            }

            bombCtx.font = 'bold 30px monospace';
            bombCtx.fillStyle = 'white';
            bombCtx.shadowColor = '#000';
            bombCtx.shadowBlur = 8;
            bombCtx.globalAlpha = alpha;
            bombCtx.fillText('🧶', w/2 - 20, h/2 + 10);
            bombCtx.shadowBlur = 0;
            bombCtx.globalAlpha = 1.0;
        }

        // Отрисовка прогресса для универсального шара
        let rainbowCtx, rainbowCanvas;
        function initRainbowCanvas() {
            rainbowCanvas = document.getElementById('rainbowCanvas');
            if (rainbowCanvas) {
                rainbowCtx = rainbowCanvas.getContext('2d');
            }
        }

        function drawRainbowProgress() {
            if (!rainbowCtx || !rainbowCanvas) return;
            const w = rainbowCanvas.width;
            const h = rainbowCanvas.height;
            rainbowCtx.clearRect(0, 0, w, h);

            rainbowCtx.beginPath();
            rainbowCtx.arc(w/2, h/2, w/2 - 4, 0, 2 * Math.PI);
            rainbowCtx.fillStyle = '#333';
            rainbowCtx.fill();
            rainbowCtx.strokeStyle = '#555';
            rainbowCtx.lineWidth = 2;
            rainbowCtx.stroke();

            let progressColor;
            if (rainbowActive) {
                progressColor = '#FFD700'; // золотой
            } else if (rainbowAvailable) {
                progressColor = '#3498db'; // синий
            } else {
                progressColor = '#2ecc71'; // зелёный во время зарядки
            }

            let alpha = 1.0;
            if (rainbowAvailable && !rainbowActive) {
                alpha = 0.2 + 0.8 * (Math.sin(pulsePhase) * 0.5 + 0.5);
            }

            const percent = rainbowCharge / RAINBOW_THRESHOLD;
            if (percent > 0) {
                rainbowCtx.beginPath();
                rainbowCtx.moveTo(w/2, h/2);
                rainbowCtx.arc(w/2, h/2, w/2 - 4, -Math.PI/2, -Math.PI/2 + 2 * Math.PI * percent);
                rainbowCtx.closePath();
                rainbowCtx.fillStyle = progressColor;
                rainbowCtx.globalAlpha = alpha;
                rainbowCtx.fill();
                rainbowCtx.globalAlpha = 1.0;
            }

            rainbowCtx.font = 'bold 30px monospace';
            rainbowCtx.fillStyle = 'white';
            rainbowCtx.shadowColor = '#000';
            rainbowCtx.shadowBlur = 8;
            rainbowCtx.globalAlpha = alpha;
            rainbowCtx.fillText('🌈', w/2 - 20, h/2 + 10);
            rainbowCtx.shadowBlur = 0;
            rainbowCtx.globalAlpha = 1.0;
        }

        // Обновление DOM-элементов очереди
        function updateQueueDisplay() {
            const topBall = document.getElementById('queueBallTop');
            const bottomBall = document.getElementById('queueBallBottom');
            if (!topBall || !bottomBall) return;

            const topColor = ballQueue[0];
            const bottomColor = ballQueue[1];
            const topImg = ballImages[topColor];
            const bottomImg = ballImages[bottomColor];

            topBall.style.background = topImg ? `url(${topImg.src}) center/cover` : topColor;
            bottomBall.style.background = bottomImg ? `url(${bottomImg.src}) center/cover` : bottomColor;
        }

        // Переключение шаров
        function switchQueue() {
            if (ballQueue.length >= 2) {
                [ballQueue[0], ballQueue[1]] = [ballQueue[1], ballQueue[0]];
                updateQueueDisplay();
            }
        }

        // Зарядка клубка
        function addBombCharge(amount) {
            if (bombAvailable) return;
            bombCharge += amount;
            if (bombCharge >= BOMB_THRESHOLD) {
                bombCharge = BOMB_THRESHOLD;
                bombAvailable = true;
            }
            drawBombProgress();
        }

        function resetBomb() {
            bombCharge = 0;
            bombAvailable = false;
            bombActive = false;
            drawBombProgress();
        }

        function useBomb() {
            if (bombAvailable) {
                bombActive = true;
                drawBombProgress();
            }
        }

        // Зарядка универсального шара
        function addRainbowCharge(amount) {
            if (rainbowAvailable) return;
            rainbowCharge += amount;
            if (rainbowCharge >= RAINBOW_THRESHOLD) {
                rainbowCharge = RAINBOW_THRESHOLD;
                rainbowAvailable = true;
            }
            drawRainbowProgress();
        }

        function resetRainbow() {
            rainbowCharge = 0;
            rainbowAvailable = false;
            rainbowActive = false;
            drawRainbowProgress();
        }

        function useRainbow() {
            if (rainbowAvailable) {
                rainbowActive = true;
                drawRainbowProgress();
            }
        }

        (function createBubbles() {
            const container = document.getElementById('bubbles-container');
            for (let i = 0; i < 15; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                const size = Math.random() * 100 + 30;
                bubble.style.width = size + 'px';
                bubble.style.height = size + 'px';
                bubble.style.left = Math.random() * 100 + '%';
                bubble.style.animationDelay = Math.random() * 5 + 's';
                bubble.style.animationDuration = Math.random() * 5 + 8 + 's';
                container.appendChild(bubble);
            }
        })();

        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            const userRef = db.collection('users').doc(user.uid);
            const doc = await userRef.get();
            if (!doc.exists) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = { id: user.uid, ...doc.data() };
            if (currentUser.endlessHighScore === undefined) {
                currentUser.endlessHighScore = 0;
                await userRef.update({ endlessHighScore: 0 });
            }
            currentRecord = currentUser.endlessHighScore || 0;
            await loadImages();
            initGame();
        });

        function initGame() {
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = `
                <div class="game-header">
                    <div class="header-score" id="scoreDisplay">0</div>
                    <div class="header-record">🏆 Рекорд: <span id="recordDisplay">${currentRecord}</span></div>
                </div>
                <canvas id="gameCanvas" width="420" height="500"></canvas>
                <div class="powerup-row">
                    <canvas id="bombCanvas" width="60" height="60" class="powerup-canvas"></canvas>
                    <div class="queue-circle" id="queueCircle">
                        <div class="queue-ball top" id="queueBallTop"></div>
                        <div class="queue-ball bottom" id="queueBallBottom"></div>
                    </div>
                    <canvas id="rainbowCanvas" width="60" height="60" class="powerup-canvas"></canvas>
                </div>
                <button class="btn" id="exitBtn">Выйти в меню</button>
            `;

            gameCanvas = document.getElementById('gameCanvas');
            ctx = gameCanvas.getContext('2d');
            initBombCanvas();
            initRainbowCanvas();

            initGrid();
            initQueue();
            updateQueueDisplay();
            updateScoreDisplay();
            drawBombProgress();
            drawRainbowProgress();

            document.getElementById('bombCanvas').addEventListener('click', useBomb);
            document.getElementById('rainbowCanvas').addEventListener('click', useRainbow);
            document.getElementById('queueCircle').addEventListener('click', switchQueue);

            gameActive = true;
            gameInterval = setInterval(updateGame, 1000 / 60);

            setupControls();

            document.getElementById('exitBtn').addEventListener('click', () => {
                stopGame();
                window.location.href = 'index.html';
            });
        }

        function initGrid() {
            grid = [];
            for (let r = 0; r < ROWS; r++) {
                grid[r] = Array(COLS).fill(null);
            }
            for (let r = 0; r < 3; r++) {
                for (let c = 0; c < COLS; c++) {
                    grid[r][c] = COLORS[Math.floor(Math.random() * COLORS.length)];
                }
            }
            startOffset = 0;
            shotsFired = 0;
            gameScore = 0;
            gameCombo = 0;
            dyingBalls = [];
            resetBomb();
            resetRainbow();
        }

        function initQueue() {
            ballQueue = [];
            for (let i = 0; i < 2; i++) {
                ballQueue.push(COLORS[Math.floor(Math.random() * COLORS.length)]);
            }
        }

        function shiftQueue() {
            ballQueue.shift();
            ballQueue.push(COLORS[Math.floor(Math.random() * COLORS.length)]);
            updateQueueDisplay();
        }

        function getBallXY(row, col) {
            const offset = (row + startOffset) % 2;
            const x = col * CELL_W + offset * X_OFFSET + BALL_RADIUS;
            const y = row * CELL_H + BALL_RADIUS + 15;
            return { x, y };
        }

        function findNearestFreeCell(x, y) {
            let minDist = Infinity;
            let best = null;
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (grid[r][c] !== null) continue;
                    const { x: cx, y: cy } = getBallXY(r, c);
                    const d = Math.hypot(x - cx, y - cy);
                    if (d < minDist) {
                        minDist = d;
                        best = { row: r, col: c };
                    }
                }
            }
            return best;
        }

        function predictTrajectory(startX, startY, vx, vy) {
            let points = [];
            let x = startX, y = startY;
            let dx = vx, dy = vy;
            let traveled = 0;
            let maxIter = 100;

            while (traveled < MAX_TRAJECTORY_LENGTH && maxIter-- > 0) {
                let tLeft = dx < 0 ? (BALL_RADIUS - x) / dx : Infinity;
                let tRight = dx > 0 ? (gameCanvas.width - BALL_RADIUS - x) / dx : Infinity;
                let tTop = dy < 0 ? (BALL_RADIUS - y) / dy : Infinity;

                let tWall = Math.min(tLeft, tRight, tTop);
                if (tWall === Infinity) break;

                let newX = x + dx * tWall;
                let newY = y + dy * tWall;
                let segmentLength = Math.hypot(newX - x, newY - y);

                if (traveled + segmentLength > MAX_TRAJECTORY_LENGTH) {
                    let fraction = (MAX_TRAJECTORY_LENGTH - traveled) / segmentLength;
                    newX = x + dx * tWall * fraction;
                    newY = y + dy * tWall * fraction;
                    points.push({ x: newX, y: newY });
                    break;
                }

                points.push({ x: newX, y: newY });
                traveled += segmentLength;

                if (tWall === tLeft || tWall === tRight) dx = -dx;
                else if (tWall === tTop) dy = -dy;

                x = newX;
                y = newY;
            }
            return points;
        }

        function checkCollision(ballX, ballY, vx, vy) {
            if (ballX - BALL_RADIUS < 0) return { type: 'wall', side: 'left', newVx: Math.abs(vx) };
            if (ballX + BALL_RADIUS > gameCanvas.width) return { type: 'wall', side: 'right', newVx: -Math.abs(vx) };
            if (ballY - BALL_RADIUS < 0) return { type: 'ceiling', x: ballX, y: ballY };

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (grid[r][c] === null) continue;
                    const { x: cx, y: cy } = getBallXY(r, c);
                    const dist = Math.hypot(ballX - cx, ballY - cy);
                    if (dist < 2 * BALL_RADIUS - 2) {
                        return { type: 'ball', row: r, col: c, x: cx, y: cy };
                    }
                }
            }
            return null;
        }

        function findCluster(row, col, color) {
            if (!grid[row]?.[col] || grid[row][col] !== color) return [];
            const visited = Array(ROWS).fill().map(() => Array(COLS).fill(false));
            const queue = [[row, col]];
            const cluster = [];
            while (queue.length) {
                const [r, c] = queue.shift();
                if (visited[r][c]) continue;
                visited[r][c] = true;
                if (grid[r][c] === color) {
                    cluster.push([r, c]);
                    const offset = (r + startOffset) % 2;
                    const neighbors = [
                        [r-1, c], [r+1, c], [r, c-1], [r, c+1]
                    ];
                    if (offset === 0) {
                        if (r > 0) {
                            neighbors.push([r-1, c-1]);
                            neighbors.push([r-1, c]);
                        }
                        if (r < ROWS-1) {
                            neighbors.push([r+1, c-1]);
                            neighbors.push([r+1, c]);
                        }
                    } else {
                        if (r > 0) {
                            neighbors.push([r-1, c]);
                            neighbors.push([r-1, c+1]);
                        }
                        if (r < ROWS-1) {
                            neighbors.push([r+1, c]);
                            neighbors.push([r+1, c+1]);
                        }
                    }
                    for (let [nr, nc] of neighbors) {
                        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && !visited[nr][nc] && grid[nr][nc] === color) {
                            queue.push([nr, nc]);
                        }
                    }
                }
            }
            return cluster;
        }

        function removeFloating() {
            const visited = Array(ROWS).fill().map(() => Array(COLS).fill(false));
            const queue = [];

            for (let c = 0; c < COLS; c++) {
                if (grid[0][c] !== null) {
                    queue.push([0, c]);
                    visited[0][c] = true;
                }
            }

            while (queue.length) {
                const [r, c] = queue.shift();
                const offset = (r + startOffset) % 2;
                const neighbors = [
                    [r-1, c], [r+1, c], [r, c-1], [r, c+1]
                ];
                if (offset === 0) {
                    if (r > 0) {
                        neighbors.push([r-1, c-1]);
                        neighbors.push([r-1, c]);
                    }
                    if (r < ROWS-1) {
                        neighbors.push([r+1, c-1]);
                        neighbors.push([r+1, c]);
                    }
                } else {
                    if (r > 0) {
                        neighbors.push([r-1, c]);
                        neighbors.push([r-1, c+1]);
                    }
                    if (r < ROWS-1) {
                        neighbors.push([r+1, c]);
                        neighbors.push([r+1, c+1]);
                    }
                }
                for (let [nr, nc] of neighbors) {
                    if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && !visited[nr][nc] && grid[nr][nc] !== null) {
                        visited[nr][nc] = true;
                        queue.push([nr, nc]);
                    }
                }
            }

            let removed = [];
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (grid[r][c] !== null && !visited[r][c]) {
                        removed.push({ row: r, col: c, color: grid[r][c] });
                        grid[r][c] = null;
                    }
                }
            }
            return removed;
        }

        function addNewRow() {
            for (let r = ROWS - 1; r > 0; r--) {
                grid[r] = [...grid[r-1]];
            }
            grid[0] = Array(COLS).fill(null).map(() => COLORS[Math.floor(Math.random() * COLORS.length)]);
            startOffset = 1 - startOffset;
        }

        function addDyingBalls(balls) {
            const now = performance.now();
            balls.forEach(b => {
                const { row, col, color } = b;
                const { x, y } = getBallXY(row, col);
                dyingBalls.push({
                    x, y,
                    color,
                    startTime: now,
                    duration: 800
                });
            });
        }

        function explodeBomb(row, col) {
            const visited = Array(ROWS).fill().map(() => Array(COLS).fill(false));
            const queue = [{ r: row, c: col, dist: 0 }];
            const destroyed = [];
            visited[row][col] = true;

            while (queue.length) {
                const { r, c, dist } = queue.shift();
                if (dist > 3) continue;

                if (grid[r][c] !== null) {
                    destroyed.push({ row: r, col: c, color: grid[r][c] });
                    grid[r][c] = null;
                }

                if (dist === 3) continue;

                const offset = (r + startOffset) % 2;
                const neighbors = [
                    [r-1, c], [r+1, c], [r, c-1], [r, c+1]
                ];
                if (offset === 0) {
                    if (r > 0) {
                        neighbors.push([r-1, c-1]);
                        neighbors.push([r-1, c]);
                    }
                    if (r < ROWS-1) {
                        neighbors.push([r+1, c-1]);
                        neighbors.push([r+1, c]);
                    }
                } else {
                    if (r > 0) {
                        neighbors.push([r-1, c]);
                        neighbors.push([r-1, c+1]);
                    }
                    if (r < ROWS-1) {
                        neighbors.push([r+1, c]);
                        neighbors.push([r+1, c+1]);
                    }
                }

                for (let [nr, nc] of neighbors) {
                    if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && !visited[nr][nc]) {
                        visited[nr][nc] = true;
                        queue.push({ r: nr, c: nc, dist: dist + 1 });
                    }
                }
            }
            return destroyed;
        }

        async function processShot(targetRow, targetCol, ball, hitColor) {
            if (targetRow === null || targetCol === null) return 0;

            let totalDestroyed = 0;
            let pointsEarned = 0;
            let destroyedBalls = [];

            if (ball.isBomb) {
                destroyedBalls = explodeBomb(targetRow, targetCol);
                totalDestroyed = destroyedBalls.length;
                pointsEarned = totalDestroyed * 10;
                if (destroyedBalls.length > 0) {
                    addDyingBalls(destroyedBalls);
                }
                resetBomb();
            } else {
                let color;
                if (ball.isRainbow) {
                    if (hitColor) {
                        color = hitColor;
                    } else {
                        color = COLORS[Math.floor(Math.random() * COLORS.length)];
                    }
                    resetRainbow();
                } else {
                    color = ball.color;
                }

                grid[targetRow][targetCol] = color;

                const cluster = findCluster(targetRow, targetCol, color);
                if (cluster.length >= 3) {
                    cluster.forEach(([r, c]) => {
                        destroyedBalls.push({ row: r, col: c, color: grid[r][c] });
                        grid[r][c] = null;
                        totalDestroyed++;
                        pointsEarned += 10;
                    });
                }

                const floating = removeFloating();
                floating.forEach(item => {
                    destroyedBalls.push(item);
                    totalDestroyed++;
                    pointsEarned += 10;
                });

                if (destroyedBalls.length > 0) {
                    addDyingBalls(destroyedBalls);
                }

                if (!ball.isBomb && !ball.isRainbow) {
                    if (!bombAvailable) addBombCharge(totalDestroyed);
                    if (!rainbowAvailable) addRainbowCharge(totalDestroyed);
                } else if (ball.isRainbow) {
                    if (!bombAvailable) addBombCharge(totalDestroyed);
                } else if (ball.isBomb) {
                    if (!rainbowAvailable) addRainbowCharge(totalDestroyed);
                }
            }

            if (totalDestroyed > 0) {
                gameCombo++;
                gameScore += pointsEarned * gameCombo;
            } else {
                gameCombo = 0;
            }

            updateScoreDisplay();

            for (let c = 0; c < COLS; c++) {
                if (grid[ROWS-1][c] !== null) {
                    if (gameScore > currentRecord) {
                        currentRecord = gameScore;
                        await db.collection('users').doc(currentUser.id).update({
                            endlessHighScore: currentRecord
                        });
                        updateRecordDisplay();
                    }
                    setTimeout(() => {
                        stopGame();
                        window.location.href = 'index.html';
                    }, 1500);
                    return;
                }
            }

            return totalDestroyed;
        }

        function shoot(dx, dy) {
            if (shooting || !gameActive) return;
            const len = Math.hypot(dx, dy);
            if (len < 0.001) return;
            const speed = BALL_SPEED;

            if (bombActive && bombAvailable) {
                ball = {
                    x: gameCanvas.width / 2,
                    y: gameCanvas.height - 40,
                    vx: (dx / len) * speed,
                    vy: (dy / len) * speed,
                    isBomb: true,
                    isRainbow: false,
                    active: true
                };
                bombActive = false;
                shooting = true;
                drawBombProgress();
            } else if (rainbowActive && rainbowAvailable) {
                ball = {
                    x: gameCanvas.width / 2,
                    y: gameCanvas.height - 40,
                    vx: (dx / len) * speed,
                    vy: (dy / len) * speed,
                    isBomb: false,
                    isRainbow: true,
                    active: true
                };
                rainbowActive = false;
                shooting = true;
                drawRainbowProgress();
            } else {
                ball = {
                    x: gameCanvas.width / 2,
                    y: gameCanvas.height - 40,
                    vx: (dx / len) * speed,
                    vy: (dy / len) * speed,
                    color: ballQueue[0],
                    isBomb: false,
                    isRainbow: false,
                    active: true
                };
                shooting = true;
                shiftQueue();
            }
        }

        function updateGame() {
            if (!gameActive) return;

            pulsePhase += 0.05;
            if (pulsePhase > 2 * Math.PI) pulsePhase -= 2 * Math.PI;

            const now = performance.now();
            dyingBalls = dyingBalls.filter(b => now - b.startTime < b.duration);

            if (shooting && ball.active) {
                ball.x += ball.vx;
                ball.y += ball.vy;

                const collision = checkCollision(ball.x, ball.y, ball.vx, ball.vy);
                if (collision) {
                    if (collision.type === 'wall') {
                        ball.vx = collision.newVx;
                    } else if (collision.type === 'ceiling') {
                        const cell = findNearestFreeCell(ball.x, ball.y);
                        ball.active = false;
                        shooting = false;
                        if (cell) {
                            processShot(cell.row, cell.col, ball, undefined);
                            shotsFired++;
                            if (shotsFired >= SHOTS_PER_NEW_ROW) {
                                addNewRow();
                                shotsFired = 0;
                            }
                        }
                    } else if (collision.type === 'ball') {
                        const cell = findNearestFreeCell(ball.x, ball.y);
                        ball.active = false;
                        shooting = false;
                        if (cell) {
                            const hitColor = grid[collision.row][collision.col];
                            processShot(cell.row, cell.col, ball, hitColor);
                            shotsFired++;
                            if (shotsFired >= SHOTS_PER_NEW_ROW) {
                                addNewRow();
                                shotsFired = 0;
                            }
                        }
                    }
                }
                if (ball.y - BALL_RADIUS > gameCanvas.height) {
                    ball.active = false;
                    shooting = false;
                }
            }

            drawBombProgress();
            drawRainbowProgress();
            drawGame();
        }

        function drawGame() {
            ctx.clearRect(0, 0, gameCanvas.width, gameCanvas.height);

            if (aiming && !shooting && gameActive) {
                const startX = gameCanvas.width / 2;
                const startY = gameCanvas.height - 40;
                const dx = aimX - startX;
                const dy = aimY - startY;
                const len = Math.hypot(dx, dy);
                if (len > 0.001) {
                    const vx = (dx / len) * BALL_SPEED;
                    const vy = (dy / len) * BALL_SPEED;
                    const points = predictTrajectory(startX, startY, vx, vy);
                    if (points.length > 0) {
                        ctx.beginPath();
                        ctx.moveTo(startX, startY);
                        for (let p of points) {
                            ctx.lineTo(p.x, p.y);
                        }
                        let lineColor = '#555';
                        if (bombActive && bombAvailable) {
                            lineColor = '#000000';
                        } else if (rainbowActive && rainbowAvailable) {
                            lineColor = '#FFD700';
                        }
                        ctx.strokeStyle = lineColor;
                        ctx.lineWidth = 2;
                        ctx.setLineDash([5, 5]);
                        ctx.stroke();
                        ctx.setLineDash([]);
                    }
                }
            }

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (grid[r][c]) {
                        const { x, y } = getBallXY(r, c);
                        const img = ballImages[grid[r][c]];
                        if (img) {
                            ctx.drawImage(img, x - BALL_RADIUS, y - BALL_RADIUS, BALL_RADIUS*2, BALL_RADIUS*2);
                        } else {
                            ctx.beginPath();
                            ctx.arc(x, y, BALL_RADIUS-1, 0, 2*Math.PI);
                            ctx.fillStyle = grid[r][c];
                            ctx.shadowColor = '#fff3';
                            ctx.shadowBlur = 8;
                            ctx.fill();
                            ctx.shadowBlur = 0;
                            ctx.strokeStyle = '#000';
                            ctx.lineWidth = 1.5;
                            ctx.stroke();
                        }
                    }
                }
            }

            const now = performance.now();
            dyingBalls.forEach(b => {
                const elapsed = now - b.startTime;
                const progress = Math.min(elapsed / b.duration, 1);
                const radius = BALL_RADIUS * (1 - progress * 0.8);
                const alpha = 1 - progress;
                const img = ballImages[b.color];
                if (img) {
                    ctx.globalAlpha = alpha;
                    ctx.drawImage(img, b.x - radius, b.y - radius, radius*2, radius*2);
                    ctx.globalAlpha = 1.0;
                } else {
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, radius, 0, 2*Math.PI);
                    ctx.fillStyle = b.color;
                    ctx.globalAlpha = alpha;
                    ctx.shadowBlur = 8;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    ctx.globalAlpha = 1.0;
                }
            });

            const cannonX = gameCanvas.width / 2;
            const cannonY = gameCanvas.height - 40;
            ctx.fillStyle = '#456';
            ctx.beginPath();
            ctx.moveTo(cannonX - 18, cannonY - 10);
            ctx.lineTo(cannonX + 18, cannonY - 10);
            ctx.lineTo(cannonX, cannonY + 10);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#789';
            ctx.lineWidth = 2;
            ctx.stroke();

            if (ball.active) {
                if (ball.isBomb) {
                    ctx.beginPath();
                    ctx.arc(ball.x, ball.y, BALL_RADIUS-1, 0, 2*Math.PI);
                    ctx.fillStyle = '#222';
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = '#ff4444';
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = '#ff0000';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    ctx.font = 'bold 20px monospace';
                    ctx.fillStyle = 'white';
                    ctx.fillText('🧶', ball.x - 15, ball.y + 8);
                } else if (ball.isRainbow) {
                    ctx.beginPath();
                    ctx.arc(ball.x, ball.y, BALL_RADIUS-1, 0, 2*Math.PI);
                    const gradient = ctx.createLinearGradient(ball.x-18, ball.y-18, ball.x+18, ball.y+18);
                    gradient.addColorStop(0, 'red');
                    gradient.addColorStop(0.2, 'orange');
                    gradient.addColorStop(0.4, 'yellow');
                    gradient.addColorStop(0.6, 'green');
                    gradient.addColorStop(0.8, 'blue');
                    gradient.addColorStop(1, 'violet');
                    ctx.fillStyle = gradient;
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = '#fff';
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                } else {
                    const img = ballImages[ball.color];
                    if (img) {
                        ctx.drawImage(img, ball.x - BALL_RADIUS, ball.y - BALL_RADIUS, BALL_RADIUS*2, BALL_RADIUS*2);
                    } else {
                        ctx.beginPath();
                        ctx.arc(ball.x, ball.y, BALL_RADIUS-1, 0, 2*Math.PI);
                        ctx.fillStyle = ball.color;
                        ctx.shadowBlur = 12;
                        ctx.shadowColor = '#fff9';
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                }
            }
        }

        function updateScoreDisplay() {
            const scoreEl = document.getElementById('scoreDisplay');
            if (scoreEl) scoreEl.innerText = gameScore;
        }

        function updateRecordDisplay() {
            const recordEl = document.getElementById('recordDisplay');
            if (recordEl) recordEl.innerText = currentRecord;
        }

        function stopGame() {
            gameActive = false;
            clearInterval(gameInterval);
        }

        function setupControls() {
            function handleStart(e) {
                e.preventDefault();
                if (!gameActive) return;
                const rect = gameCanvas.getBoundingClientRect();
                const scaleX = gameCanvas.width / rect.width;
                const scaleY = gameCanvas.height / rect.height;
                let clientX, clientY;
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                aimX = (clientX - rect.left) * scaleX;
                aimY = (clientY - rect.top) * scaleY;
                aiming = true;
            }

            function handleMove(e) {
                if (!aiming || !gameActive) return;
                e.preventDefault();
                const rect = gameCanvas.getBoundingClientRect();
                const scaleX = gameCanvas.width / rect.width;
                const scaleY = gameCanvas.height / rect.height;
                let clientX, clientY;
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                aimX = (clientX - rect.left) * scaleX;
                aimY = (clientY - rect.top) * scaleY;
            }

            function handleEnd(e) {
                if (!aiming || !gameActive) return;
                e.preventDefault();
                aiming = false;
                const cannonX = gameCanvas.width / 2;
                const cannonY = gameCanvas.height - 40;
                const dx = aimX - cannonX;
                const dy = aimY - cannonY;
                shoot(dx, dy);
            }

            gameCanvas.addEventListener('mousedown', handleStart);
            gameCanvas.addEventListener('mousemove', handleMove);
            gameCanvas.addEventListener('mouseup', handleEnd);
            gameCanvas.addEventListener('mouseleave', () => { aiming = false; });
            gameCanvas.addEventListener('touchstart', handleStart, { passive: false });
            gameCanvas.addEventListener('touchmove', handleMove, { passive: false });
            gameCanvas.addEventListener('touchend', handleEnd, { passive: false });
            gameCanvas.addEventListener('touchcancel', () => { aiming = false; });
        }
    </script>
