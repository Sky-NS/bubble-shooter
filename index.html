<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bubble Shooter · мобильный стиль</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .phone-frame {
            width: 380px;
            max-width: 100%;
            background: #000;
            border-radius: 36px;
            padding: 16px 12px 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 0 0 2px #333;
        }
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            padding: 0 6px 10px;
            letter-spacing: 0.3px;
        }
        .status-left {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .time {
            color: #fff;
        }
        .network {
            display: flex;
            gap: 3px;
            align-items: center;
        }
        .network span {
            background: #222;
            padding: 2px 6px;
            border-radius: 20px;
            font-size: 11px;
            color: #aaa;
        }
        .volte {
            color: #0af !important;
        }
        .speed {
            background: #1e3a3a;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            color: #2ecc71;
        }
        .battery {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .battery-level {
            background: #2ecc71;
            color: #000;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        .close-btn {
            background: #2a2a2a;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #888;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #3a3a3a;
        }
        .close-btn:hover {
            background: #3a3a3a;
            color: #fff;
        }
        .canvas-container {
            display: flex;
            justify-content: center;
            margin: 5px 0 10px;
        }
        canvas {
            background: #0b0f1a;
            border-radius: 24px;
            display: block;
            width: 100%;
            height: auto;
            border: 2px solid #2a2f3a;
            touch-action: none; /* отключаем скролл при касаниях */
        }
        .score-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            color: #ddd;
        }
        .score-labels {
            display: flex;
            gap: 20px;
            font-size: 13px;
            font-weight: 500;
            color: #888;
            margin-left: 8px;
        }
        .score-labels span {
            position: relative;
        }
        .score-labels span::before {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 8px;
            background: #555;
        }
        .progress-bar {
            flex: 1;
            height: 8px;
            background: #222;
            border-radius: 20px;
            margin: 0 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f1c40f, #e67e22);
            border-radius: 20px;
            transition: width 0.2s ease;
        }
        .next-ball {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #111;
            padding: 6px 12px;
            border-radius: 30px;
            border: 1px solid #333;
        }
        .next-ball-label {
            font-size: 12px;
            color: #aaa;
        }
        .ball-preview {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }
        .new-game-note {
            text-align: center;
            color: #555;
            font-size: 11px;
            margin-top: 12px;
            letter-spacing: 0.5px;
        }
        .new-game-note span {
            color: #f39c12;
        }
    </style>
</head>
<body>
<div class="phone-frame">
    <!-- Верхняя панель в стиле скриншотов -->
    <div class="status-bar">
        <div class="status-left">
            <span class="time" id="currentTime">22:16</span>
            <div class="network">
                <span class="volte">VoLTE</span>
                <span>4G</span>
                <span>4.5G</span>
            </div>
            <div class="speed" id="networkSpeed">2.38 KB/S</div>
        </div>
        <div class="battery">
            <span class="battery-level" id="batteryPercent">45%</span>
            <div class="close-btn" id="restartBtn">✕</div>
        </div>
    </div>

    <!-- Игровой холст -->
    <div class="canvas-container">
        <canvas id="gameCanvas" width="340" height="420"></canvas>
    </div>

    <!-- Нижняя панель со шкалой очков и следующим шариком -->
    <div class="score-panel">
        <div class="score-labels">
            <span>0</span>
            <span>100</span>
            <span>300</span>
            <span>500</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="scoreProgress" style="width:0%"></div>
        </div>
        <div class="next-ball">
            <span class="next-ball-label">next</span>
            <div class="ball-preview" id="nextBallPreview" style="background:#e67e22;"></div>
        </div>
    </div>
    <div class="new-game-note">
        <span>⚡</span> жми на поле — стреляй, собирай группы ≥3 <span>⚡</span>
    </div>
</div>

<script>
    (function() {
        // ---- Имитация верхней панели (время, скорость, батарея) ----
        function updateStatusBar() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('currentTime').innerText = `${hours}:${minutes}`;

            // Случайная скорость (для антуража)
            const speed = (Math.random() * 3).toFixed(2);
            document.getElementById('networkSpeed').innerText = `${speed} KB/S`;

            // Батарея неизменна, но можно сделать вариацию
            const battery = document.getElementById('batteryPercent');
            // оставим 45% как на скрине, но можно менять
            if (Math.random() > 0.7) {
                battery.innerText = Math.floor(30 + Math.random() * 30) + '%';
            } else {
                battery.innerText = '45%';
            }
        }
        updateStatusBar();
        setInterval(updateStatusBar, 5000);

        // ---------- НАСТРОЙКИ ИГРЫ ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Параметры сетки (staggered grid / гексагональная укладка)
        const ROWS = 10;          // ряды шариков
        const COLS = 8;           // колонки
        const BALL_RADIUS = 16;    // радиус шарика в пикселях
        const CELL_W = BALL_RADIUS * 2;               // ширина ячейки по горизонтали (32)
        const CELL_H = BALL_RADIUS * 1.7;              // высота ячейки (≈27) для гексагонального нахлёста

        // Смещение нечётных рядов (для staggered)
        const X_OFFSET = BALL_RADIUS; // половина диаметра

        // Цвета шариков
        const COLORS = ['#e67e22', '#3498db', '#e74c3c', '#2ecc71', '#f1c40f', '#9b59b6'];
        let nextBallColor = COLORS[Math.floor(Math.random() * COLORS.length)];

        // Игровое поле: двумерный массив, null – пусто, иначе цвет (строка)
        let grid = [];
        for (let r = 0; r < ROWS; r++) {
            grid[r] = Array(COLS).fill(null);
        }

        // Заполним несколькими шариками для начала (верхние 3 ряда случайно)
        for (let r = 0; r < 3; r++) {
            for (let c = 0; c < COLS; c++) {
                if (Math.random() > 0.3) { // не все ячейки заняты
                    grid[r][c] = COLORS[Math.floor(Math.random() * COLORS.length)];
                }
            }
        }

        // Переменные игры
        let score = 0;            // текущие очки (до 500)
        let shooting = false;     // летит ли сейчас шарик
        let ball = {              // данные летящего шарика
            x: 0, y: 0,
            vx: 0, vy: 0,
            color: '',
            active: false
        };

        // Пушка (начальная позиция выстрела)
        const cannonX = canvas.width / 2;
        const cannonY = canvas.height - 40;

        // ---------- Функции пересчёта координат сетки ----------
        function getBallXY(row, col) {
            const x = col * CELL_W + (row % 2 === 0 ? 0 : X_OFFSET) + BALL_RADIUS;
            const y = row * CELL_H + BALL_RADIUS + 15; // +15 отступ сверху
            return { x, y };
        }

        // Найти ближайшую свободную ячейку к точке (x, y)
        function findNearestFreeCell(x, y) {
            let minDist = Infinity;
            let best = null;
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (grid[r][c] !== null) continue; // только свободные
                    const { x: cx, y: cy } = getBallXY(r, c);
                    const d = Math.hypot(x - cx, y - cy);
                    if (d < minDist) {
                        minDist = d;
                        best = { row: r, col: c };
                    }
                }
            }
            return best;
        }

        // Проверка столкновения летящего шарика с любым шариком на сетке или со стенами
        function checkCollision(ballX, ballY, ballRadius, vx, vy, gridBalls) {
            // Стены: левая/правая (отскок)
            if (ballX - ballRadius < 0) {
                return { type: 'wall', side: 'left', newVx: Math.abs(vx) };
            }
            if (ballX + ballRadius > canvas.width) {
                return { type: 'wall', side: 'right', newVx: -Math.abs(vx) };
            }
            // Верхняя стена (остановка)
            if (ballY - ballRadius < 0) {
                return { type: 'ceiling', x: ballX, y: ballY };
            }
            // Проверка столкновения с шариками в сетке
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (grid[r][c] === null) continue;
                    const { x: cx, y: cy } = getBallXY(r, c);
                    const dist = Math.hypot(ballX - cx, ballY - cy);
                    if (dist < 2 * ballRadius - 1) { // почти касание
                        return { type: 'ball', row: r, col: c, x: cx, y: cy };
                    }
                }
            }
            return null;
        }

        // Найти все связанные одинаковые шарики (BFS)
        function findCluster(row, col, color) {
            if (grid[row][col] !== color) return [];
            const visited = Array(ROWS).fill().map(() => Array(COLS).fill(false));
            const queue = [[row, col]];
            const cluster = [];
            while (queue.length) {
                const [r, c] = queue.shift();
                if (visited[r][c]) continue;
                visited[r][c] = true;
                if (grid[r][c] === color) {
                    cluster.push([r, c]);
                    // Соседи (до 6 направлений для staggered)
                    const neighbors = [
                        [r-1, c], [r+1, c], [r, c-1], [r, c+1],
                        [r-1, c + (r%2===0? -1 : 1)], [r+1, c + (r%2===0? -1 : 1)]
                    ];
                    for (let [nr, nc] of neighbors) {
                        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && !visited[nr][nc] && grid[nr][nc] === color) {
                            queue.push([nr, nc]);
                        }
                    }
                }
            }
            return cluster;
        }

        // Удалить шарики, потерявшие связь с "потолком" (висят в воздухе)
        function removeFloating() {
            const visited = Array(ROWS).fill().map(() => Array(COLS).fill(false));
            const queue = [];

            // Считаем шарики, прикреплённые к верхней границе (ряд 0)
            for (let c = 0; c < COLS; c++) {
                if (grid[0][c] !== null) {
                    queue.push([0, c]);
                    visited[0][c] = true;
                }
            }

            // BFS от верхних шариков
            while (queue.length) {
                const [r, c] = queue.shift();
                const neighbors = [
                    [r-1, c], [r+1, c], [r, c-1], [r, c+1],
                    [r-1, c + (r%2===0? -1 : 1)], [r+1, c + (r%2===0? -1 : 1)]
                ];
                for (let [nr, nc] of neighbors) {
                    if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && !visited[nr][nc] && grid[nr][nc] !== null) {
                        visited[nr][nc] = true;
                        queue.push([nr, nc]);
                    }
                }
            }

            // Удаляем все шарики, до которых не дошли
            let removed = 0;
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (grid[r][c] !== null && !visited[r][c]) {
                        grid[r][c] = null;
                        removed++;
                    }
                }
            }
            return removed;
        }

        // Обработка выстрела: вставить шарик, проверить комбинации, добавить очки
        function handleShot(targetRow, targetCol, color) {
            if (targetRow === null || targetCol === null) return false;
            if (grid[targetRow][targetCol] !== null) return false; // ячейка занята

            // Вставляем шарик
            grid[targetRow][targetCol] = color;

            // Проверяем группу
            const cluster = findCluster(targetRow, targetCol, color);
            let pointsEarned = 0;
            if (cluster.length >= 3) {
                for (let [r, c] of cluster) {
                    grid[r][c] = null;
                    pointsEarned += 10;
                }
            }

            // Убираем зависшие
            pointsEarned += removeFloating() * 10;

            // Обновляем счёт
            score += pointsEarned;
            if (score >= 500) {
                score = 500; // максимум, можно ввести новую игру
            }
            document.getElementById('scoreProgress').style.width = (score / 500 * 100) + '%';

            // Выбираем следующий цвет
            nextBallColor = COLORS[Math.floor(Math.random() * COLORS.length)];
            document.getElementById('nextBallPreview').style.backgroundColor = nextBallColor;

            return true;
        }

        // Функция выстрела из пушки по направлению (dx, dy)
        function shoot(dx, dy) {
            if (shooting) return; // уже летит

            // Нормализуем вектор
            const len = Math.hypot(dx, dy);
            if (len < 0.001) return;
            const vx = (dx / len) * 4; // скорость
            const vy = (dy / len) * 4;

            ball = {
                x: cannonX,
                y: cannonY - 10, // чуть выше пушки
                vx: vx,
                vy: vy,
                color: nextBallColor,
                active: true
            };
            shooting = true;
        }

        // Обновление анимации (движение летящего шарика)
        function updateAnimation() {
            if (!shooting || !ball.active) return;

            // Двигаем
            ball.x += ball.vx;
            ball.y += ball.vy;

            // Проверяем столкновения
            const collision = checkCollision(ball.x, ball.y, BALL_RADIUS, ball.vx, ball.vy);
            if (collision) {
                if (collision.type === 'wall') {
                    // Отскок
                    ball.vx = collision.newVx;
                } else if (collision.type === 'ceiling') {
                    // Врезались в потолок
                    const cell = findNearestFreeCell(ball.x, ball.y);
                    if (cell) {
                        handleShot(cell.row, cell.col, ball.color);
                    }
                    ball.active = false;
                    shooting = false;
                } else if (collision.type === 'ball') {
                    // Столкнулись с шариком: ищем свободную ячейку рядом с местом столкновения
                    const cell = findNearestFreeCell(ball.x, ball.y);
                    if (cell) {
                        handleShot(cell.row, cell.col, ball.color);
                    }
                    ball.active = false;
                    shooting = false;
                }
            }

            // Если улетел за нижний край (редко) – деактивируем
            if (ball.y - BALL_RADIUS > canvas.height) {
                ball.active = false;
                shooting = false;
            }
        }

        // Отрисовка всего
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Рисуем сетку (для красоты полупрозрачные линии)
            ctx.strokeStyle = '#2a3a4a';
            ctx.lineWidth = 0.5;
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const { x, y } = getBallXY(r, c);
                    ctx.beginPath();
                    ctx.arc(x, y, BALL_RADIUS-1, 0, 2*Math.PI);
                    ctx.strokeStyle = '#1e2f3a';
                    ctx.stroke();
                }
            }

            // Рисуем шарики в сетке
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (grid[r][c]) {
                        const { x, y } = getBallXY(r, c);
                        ctx.beginPath();
                        ctx.arc(x, y, BALL_RADIUS-1, 0, 2*Math.PI);
                        ctx.fillStyle = grid[r][c];
                        ctx.shadowColor = '#fff3';
                        ctx.shadowBlur = 8;
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        ctx.strokeStyle = '#000';
                        ctx.lineWidth = 1.5;
                        ctx.stroke();
                    }
                }
            }

            // Рисуем пушку (нижний треугольник)
            ctx.fillStyle = '#aaa';
            ctx.beginPath();
            ctx.moveTo(cannonX - 18, cannonY - 10);
            ctx.lineTo(cannonX + 18, cannonY - 10);
            ctx.lineTo(cannonX, cannonY + 10);
            ctx.closePath();
            ctx.fillStyle = '#456';
            ctx.fill();
            ctx.strokeStyle = '#789';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Рисуем летящий шарик
            if (ball.active) {
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, BALL_RADIUS-1, 0, 2*Math.PI);
                ctx.fillStyle = ball.color;
                ctx.shadowBlur = 12;
                ctx.shadowColor = '#fff9';
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        // Игровой цикл
        function gameLoop() {
            updateAnimation();
            draw();
            requestAnimationFrame(gameLoop);
        }
        gameLoop();

        // ---------- Обработка выстрела по клику / касанию ----------
        canvas.addEventListener('mousedown', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const mouseX = (e.clientX - rect.left) * scaleX;
            const mouseY = (e.clientY - rect.top) * scaleY;
            const dx = mouseX - cannonX;
            const dy = mouseY - cannonY;
            shoot(dx, dy);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const touchX = (touch.clientX - rect.left) * scaleX;
            const touchY = (touch.clientY - rect.top) * scaleY;
            const dx = touchX - cannonX;
            const dy = touchY - cannonY;
            shoot(dx, dy);
        }, { passive: false });

        // Кнопка "X" перезапускает игру
        document.getElementById('restartBtn').addEventListener('click', () => {
            // Очистить сетку, заполнить верхние ряды
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    grid[r][c] = null;
                }
            }
            for (let r = 0; r < 3; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (Math.random() > 0.3) {
                        grid[r][c] = COLORS[Math.floor(Math.random() * COLORS.length)];
                    }
                }
            }
            score = 0;
            document.getElementById('scoreProgress').style.width = '0%';
            nextBallColor = COLORS[Math.floor(Math.random() * COLORS.length)];
            document.getElementById('nextBallPreview').style.backgroundColor = nextBallColor;
            ball.active = false;
            shooting = false;
        });

        // Инициализация предпросмотра следующего шарика
        document.getElementById('nextBallPreview').style.backgroundColor = nextBallColor;
    })();
</script>
</body>
  </html>
