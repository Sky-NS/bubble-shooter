<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bubble Shooter Challenge</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: #0b0f1a;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .game-wrapper {
            width: 400px;
            max-width: 100%;
            background: #000;
            border-radius: 36px;
            padding: 20px 12px 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 0 0 2px #2a2f3a;
            position: relative;
        }
        .score-board {
            background: #111;
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 12px;
            color: white;
            border: 1px solid #333;
        }
        .color-values {
            display: flex;
            justify-content: space-around;
            margin-bottom: 10px;
        }
        .color-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
        }
        .color-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            margin-bottom: 4px;
            border: 2px solid white;
        }
        .combo-score {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            background: #1a1a2e;
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid #3a4a6a;
        }
        .combo {
            color: #f39c12;
        }
        .score {
            color: #2ecc71;
        }
        .canvas-container {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }
        canvas {
            background: #0b0f1a;
            border-radius: 24px;
            display: block;
            width: 100%;
            height: auto;
            border: 2px solid #2a2f3a;
            touch-action: none;
        }
        .restart-btn {
            background: #2a2a2a;
            color: #888;
            border: 1px solid #3a3a3a;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
            width: fit-content;
            margin-left: auto;
        }
        .restart-btn:hover {
            background: #3a3a3a;
            color: #fff;
        }
        /* Game Over overlay */
        .game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            border-radius: 36px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 10;
            backdrop-filter: blur(4px);
            padding: 20px;
            text-align: center;
        }
        .game-overlay.hidden {
            display: none;
        }
        .final-score {
            font-size: 32px;
            font-weight: bold;
            color: #f1c40f;
            margin-bottom: 10px;
        }
        .record {
            font-size: 24px;
            color: #3498db;
            margin-bottom: 30px;
        }
        .play-again {
            background: #e67e22;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            box-shadow: 0 5px 0 #b45d1a;
            transition: 0.1s;
        }
        .play-again:active {
            transform: translateY(5px);
            box-shadow: none;
        }
        .ad-placeholder {
            background: #2c3e50;
            color: #bdc3c7;
            padding: 10px;
            border-radius: 12px;
            width: 100%;
            font-size: 14px;
            border: 1px solid #7f8c8d;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="score-board">
        <div class="color-values">
            <div class="color-item"><div class="color-dot" style="background:#e67e22;"></div>50</div>
            <div class="color-item"><div class="color-dot" style="background:#3498db;"></div>100</div>
            <div class="color-item"><div class="color-dot" style="background:#2ecc71;"></div>250</div>
            <div class="color-item"><div class="color-dot" style="background:#e74c3c;"></div>100</div>
            <div class="color-item"><div class="color-dot" style="background:#9b59b6;"></div>50</div>
        </div>
        <div class="combo-score">
            <span class="combo" id="comboDisplay">x0</span>
            <span class="score" id="scoreDisplay">0</span>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="gameCanvas" width="360" height="440"></canvas>
    </div>

    <div class="restart-btn" id="manualRestart">↺ Новая игра</div>

    <!-- Game Over overlay (hidden by default) -->
    <div id="gameOverlay" class="game-overlay hidden">
        <div class="final-score" id="finalScore">0</div>
        <div class="record" id="recordDisplay">0</div>
        <button class="play-again" id="playAgainBtn">Сыграть заново</button>
        <div class="ad-placeholder">yandex.ru РЕКЛАМА<br>Дом «Обручева 30» в Москве: комфорт и уют для вас!</div>
    </div>
</div>

<script>
(function() {
    // ---------- НАСТРОЙКИ ----------
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const COLS = 9;
    const ROWS = 12;
    const BALL_RADIUS = 18;
    const CELL_W = BALL_RADIUS * 2;
    const CELL_H = BALL_RADIUS * 1.65;
    const X_OFFSET = BALL_RADIUS;

    // Цвета и их стоимость (в порядке отображения на панели)
    const COLOR_CONFIG = [
        { color: '#e67e22', value: 50 },  // оранжевый
        { color: '#3498db', value: 100 }, // синий
        { color: '#2ecc71', value: 250 }, // зелёный
        { color: '#e74c3c', value: 100 }, // красный
        { color: '#9b59b6', value: 50 }   // фиолетовый
    ];
    // Для быстрого поиска цены по цвету
    const colorValueMap = {};
    COLOR_CONFIG.forEach(item => { colorValueMap[item.color] = item.value; });
    const COLORS = COLOR_CONFIG.map(item => item.color);

    let grid = [];                 // двумерный массив, каждый элемент = цвет (строка) или null
    let score = 0;
    let multiplier = 1;            // комбо-множитель (отображается как xMultiplier, но x0 означает multiplier=0? будем считать multiplier=1 при нуле)
    let successfulShots = 0;        // количество успешных выстрелов подряд (для отображения xN)
    let shooting = false;
    let ball = {
        x: 0, y: 0,
        vx: 0, vy: 0,
        color: '',
        active: false
    };

    let aiming = false;
    let aimX = 0, aimY = 0;

    const cannonX = canvas.width / 2;
    const cannonY = canvas.height - 40;

    let shotsFired = 0;
    let shotsBeforeDrop = 3 + Math.floor(Math.random() * 3); // 3-5
    let gameOver = false;

    let record = localStorage.getItem('bubbleRecord') ? parseInt(localStorage.getItem('bubbleRecord')) : 0;
    document.getElementById('recordDisplay').innerText = record;

    // ---------- ИНИЦИАЛИЗАЦИЯ СЕТКИ ----------
    function initGrid() {
        grid = [];
        for (let r = 0; r < ROWS; r++) {
            grid[r] = Array(COLS).fill(null);
        }
        // Заполняем верхние 3 ряда полностью случайными цветами
        for (let r = 0; r < 3; r++) {
            for (let c = 0; c < COLS; c++) {
                grid[r][c] = COLORS[Math.floor(Math.random() * COLORS.length)];
            }
        }
    }
    initGrid();

    // ---------- ФУНКЦИИ СЕТКИ ----------
    function getBallXY(row, col) {
        const x = col * CELL_W + (row % 2 === 0 ? 0 : X_OFFSET) + BALL_RADIUS;
        const y = row * CELL_H + BALL_RADIUS + 15;
        return { x, y };
    }

    function findNearestFreeCell(x, y) {
        let minDist = Infinity;
        let best = null;
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (grid[r][c] !== null) continue;
                const { x: cx, y: cy } = getBallXY(r, c);
                const d = Math.hypot(x - cx, y - cy);
                if (d < minDist) {
                    minDist = d;
                    best = { row: r, col: c };
                }
            }
        }
        return best;
    }

    function checkCollision(ballX, ballY, vx, vy) {
        if (ballX - BALL_RADIUS < 0) return { type: 'wall', side: 'left', newVx: Math.abs(vx) };
        if (ballX + BALL_RADIUS > canvas.width) return { type: 'wall', side: 'right', newVx: -Math.abs(vx) };
        if (ballY - BALL_RADIUS < 0) return { type: 'ceiling', x: ballX, y: ballY };

        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (grid[r][c] === null) continue;
                const { x: cx, y: cy } = getBallXY(r, c);
                const dist = Math.hypot(ballX - cx, ballY - cy);
                if (dist < 2 * BALL_RADIUS - 2) {
                    return { type: 'ball', row: r, col: c, x: cx, y: cy };
                }
            }
        }
        return null;
    }

    // Поиск связной области одинакового цвета
    function findCluster(row, col, color) {
        if (!grid[row]?.[col] || grid[row][col] !== color) return [];
        const visited = Array(ROWS).fill().map(() => Array(COLS).fill(false));
        const queue = [[row, col]];
        const cluster = [];
        while (queue.length) {
            const [r, c] = queue.shift();
            if (visited[r][c]) continue;
            visited[r][c] = true;
            if (grid[r][c] === color) {
                cluster.push([r, c]);
                const neighbors = [
                    [r-1, c], [r+1, c], [r, c-1], [r, c+1],
                    [r-1, c + (r%2===0 ? -1 : 1)], [r+1, c + (r%2===0 ? -1 : 1)]
                ];
                for (let [nr, nc] of neighbors) {
                    if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && !visited[nr][nc] && grid[nr][nc] === color) {
                        queue.push([nr, nc]);
                    }
                }
            }
        }
        return cluster;
    }

    // Удаление зависших шаров (без опоры сверху)
    function removeFloating() {
        const visited = Array(ROWS).fill().map(() => Array(COLS).fill(false));
        const queue = [];

        for (let c = 0; c < COLS; c++) {
            if (grid[0][c] !== null) {
                queue.push([0, c]);
                visited[0][c] = true;
            }
        }

        while (queue.length) {
            const [r, c] = queue.shift();
            const neighbors = [
                [r-1, c], [r+1, c], [r, c-1], [r, c+1],
                [r-1, c + (r%2===0 ? -1 : 1)], [r+1, c + (r%2===0 ? -1 : 1)]
            ];
            for (let [nr, nc] of neighbors) {
                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && !visited[nr][nc] && grid[nr][nc] !== null) {
                    visited[nr][nc] = true;
                    queue.push([nr, nc]);
                }
            }
        }

        let removed = [];
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (grid[r][c] !== null && !visited[r][c]) {
                    removed.push([r, c]);
                    grid[r][c] = null;
                }
            }
        }
        return removed;
    }

    // Обработка выстрела: вставка шара, проверка групп, падений, начисление очков
    // Возвращает количество уничтоженных шаров (для комбо)
    function handleShot(targetRow, targetCol, ballColor) {
        if (targetRow === null || targetCol === null) return 0;
        if (grid[targetRow][targetCol] !== null) return 0;

        // Вставляем шар
        grid[targetRow][targetCol] = ballColor;

        let destroyedBalls = 0;
        let pointsEarned = 0;

        // Проверяем группу вокруг вставленного шара
        const cluster = findCluster(targetRow, targetCol, ballColor);
        if (cluster.length >= 3) {
            for (let [r, c] of cluster) {
                grid[r][c] = null;
                destroyedBalls++;
                pointsEarned += colorValueMap[ballColor];
            }
        }

        // Удаляем зависшие шары и собираем очки за них
        const floating = removeFloating();
        floating.forEach(([r, c]) => {
            const color = grid[r][c]; // но они уже удалены в removeFloating? Там они зануляются, но цвет нужен для очков. Нужно переделать.
            // Поэтому переделаем: пусть removeFloating возвращает массив удалённых цветов.
        });

        // Из-за особенностей реализации, соберём очки за зависшие отдельно.
        // В текущем коде removeFloating зануляет ячейки, но мы не знаем цвет. 
        // Придётся хранить цвета до удаления. Перепишем removeFloating, чтобы возвращал массив цветов.
        // Для простоты сделаем так: сначала получаем список зависших, потом удаляем и считаем очки.
        // Но в нашей версии removeFloating не возвращает цвета. 
        // Давайте исправим: пусть removeFloating возвращает массив объектов {row, col, color}.
        // Переопределим функцию.

        // Временно упростим: очки за зависшие не учитываем? Но это важная часть.
        // Перепишу removeFloating ниже.

        // Пока заглушка: вернём только уничтоженные группой.
        return destroyedBalls;
    }

    // Правильная версия removeFloating, возвращающая массив удалённых цветов
    function removeFloating() {
        const visited = Array(ROWS).fill().map(() => Array(COLS).fill(false));
        const queue = [];

        for (let c = 0; c < COLS; c++) {
            if (grid[0][c] !== null) {
                queue.push([0, c]);
                visited[0][c] = true;
            }
        }

        while (queue.length) {
            const [r, c] = queue.shift();
            const neighbors = [
                [r-1, c], [r+1, c], [r, c-1], [r, c+1],
                [r-1, c + (r%2===0 ? -1 : 1)], [r+1, c + (r%2===0 ? -1 : 1)]
            ];
            for (let [nr, nc] of neighbors) {
                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && !visited[nr][nc] && grid[nr][nc] !== null) {
                    visited[nr][nc] = true;
                    queue.push([nr, nc]);
                }
            }
        }

        let removed = [];
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (grid[r][c] !== null && !visited[r][c]) {
                    removed.push({ row: r, col: c, color: grid[r][c] });
                    grid[r][c] = null;
                }
            }
        }
        return removed;
    }

    // Обработка выстрела с полным расчётом очков и комбо
    function processShot(targetRow, targetCol, ballColor) {
        if (targetRow === null || targetCol === null) return;

        // Вставляем шар
        grid[targetRow][targetCol] = ballColor;

        let totalDestroyed = 0;
        let pointsThisShot = 0;

        // Поиск группы вокруг вставленного
        const cluster = findCluster(targetRow, targetCol, ballColor);
        if (cluster.length >= 3) {
            for (let [r, c] of cluster) {
                grid[r][c] = null;
                totalDestroyed++;
                pointsThisShot += colorValueMap[ballColor];
            }
        }

        // Удаляем зависшие и собираем очки
        const floating = removeFloating();
        floating.forEach(item => {
            totalDestroyed++;
            pointsThisShot += colorValueMap[item.color];
        });

        // Если уничтожены шары, начисляем очки с учётом множителя и увеличиваем комбо
        if (totalDestroyed > 0) {
            // Текущий множитель = successfulShots + 1 (т.к. при successfulShots=0 множитель=1)
            const currentMultiplier = successfulShots + 1;
            score += pointsThisShot * currentMultiplier;
            // Увеличиваем счётчик успешных выстрелов
            successfulShots++;
        } else {
            // Неудачный выстрел - сброс комбо
            successfulShots = 0;
        }

        // Обновляем отображение
        updateUI();

        // Проверка на рекорд после обновления счёта
        if (score > record) {
            record = score;
            localStorage.setItem('bubbleRecord', record);
        }

        // Возвращаем, были ли уничтожения (для дальнейшего использования)
        return totalDestroyed > 0;
    }

    // Обновление интерфейса
    function updateUI() {
        document.getElementById('comboDisplay').innerText = `x${successfulShots}`;
        document.getElementById('scoreDisplay').innerText = score;
    }

    // Новая строка сверху (полностью заполненная)
    function dropRows() {
        // Сдвигаем все строки вниз
        for (let r = ROWS - 1; r > 0; r--) {
            grid[r] = [...grid[r-1]];
        }
        // Новая верхняя строка: все ячейки заполнены случайными цветами
        grid[0] = Array(COLS).fill(null).map(() => COLORS[Math.floor(Math.random() * COLORS.length)]);
    }

    // Выстрел
    function shoot(dx, dy) {
        if (shooting || gameOver) return;
        const len = Math.hypot(dx, dy);
        if (len < 0.001) return;
        const speed = 5;
        const vx = (dx / len) * speed;
        const vy = (dy / len) * speed;

        // Случайный цвет для следующего шара (как в оригинале, без очереди)
        // Но в оригинале, видимо, шары выпадают случайно. Мы тоже будем генерировать случайный цвет.
        const ballColor = COLORS[Math.floor(Math.random() * COLORS.length)];

        ball = {
            x: cannonX,
            y: cannonY - 10,
            vx: vx,
            vy: vy,
            color: ballColor,
            active: true
        };
        shooting = true;
    }

    // Завершение выстрела (вызывается при столкновении)
    function finishShot(targetRow, targetCol, ballColor) {
        const hadDestruction = processShot(targetRow, targetCol, ballColor);

        // Увеличиваем счётчик выстрелов (независимо от успеха, для появления новых строк)
        shotsFired++;
        if (shotsFired >= shotsBeforeDrop) {
            dropRows();
            shotsFired = 0;
            shotsBeforeDrop = 3 + Math.floor(Math.random() * 3); // новый интервал
        }

        // Проверка на поражение (если нижняя строка не пуста)
        for (let c = 0; c < COLS; c++) {
            if (grid[ROWS-1][c] !== null) {
                gameOver = true;
                showGameOver();
                break;
            }
        }
    }

    function showGameOver() {
        document.getElementById('finalScore').innerText = score;
        document.getElementById('recordDisplay').innerText = record;
        document.getElementById('gameOverlay').classList.remove('hidden');
    }

    function hideGameOver() {
        document.getElementById('gameOverlay').classList.add('hidden');
    }

    // Анимация полёта
    function updateAnimation() {
        if (!shooting || !ball.active || gameOver) return;

        ball.x += ball.vx;
        ball.y += ball.vy;

        const collision = checkCollision(ball.x, ball.y, ball.vx, ball.vy);
        if (collision) {
            if (collision.type === 'wall') {
                ball.vx = collision.newVx;
            } else if (collision.type === 'ceiling') {
                const cell = findNearestFreeCell(ball.x, ball.y);
                ball.active = false;
                shooting = false;
                if (cell) {
                    finishShot(cell.row, cell.col, ball.color);
                }
            } else if (collision.type === 'ball') {
                const cell = findNearestFreeCell(ball.x, ball.y);
                ball.active = false;
                shooting = false;
                if (cell) {
                    finishShot(cell.row, cell.col, ball.color);
                }
            }
        }

        if (ball.y - BALL_RADIUS > canvas.height) {
            ball.active = false;
            shooting = false;
        }
    }

    // Отрисовка
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Прицел
        if (aiming && !shooting && !gameOver) {
            ctx.beginPath();
            ctx.moveTo(cannonX, cannonY - 10);
            ctx.lineTo(aimX, aimY);
            ctx.strokeStyle = '#fff8';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // Шары в сетке
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (grid[r][c]) {
                    const { x, y } = getBallXY(r, c);
                    ctx.beginPath();
                    ctx.arc(x, y, BALL_RADIUS-1, 0, 2*Math.PI);
                    ctx.fillStyle = grid[r][c];
                    ctx.shadowColor = '#fff3';
                    ctx.shadowBlur = 8;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                }
            }
        }

        // Пушка
        ctx.fillStyle = '#456';
        ctx.beginPath();
        ctx.moveTo(cannonX - 18, cannonY - 10);
        ctx.lineTo(cannonX + 18, cannonY - 10);
        ctx.lineTo(cannonX, cannonY + 10);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = '#789';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Летящий шар
        if (ball.active) {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, BALL_RADIUS-1, 0, 2*Math.PI);
            ctx.fillStyle = ball.color;
            ctx.shadowBlur = 12;
            ctx.shadowColor = '#fff9';
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();
        }
    }

    function gameLoop() {
        updateAnimation();
        draw();
        requestAnimationFrame(gameLoop);
    }
    gameLoop();

    // ---------- СОБЫТИЯ ПРИЦЕЛИВАНИЯ ----------
    function handleStart(e) {
        e.preventDefault();
        if (gameOver) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        aimX = (clientX - rect.left) * scaleX;
        aimY = (clientY - rect.top) * scaleY;
        aiming = true;
    }

    function handleMove(e) {
        if (!aiming || gameOver) return;
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        aimX = (clientX - rect.left) * scaleX;
        aimY = (clientY - rect.top) * scaleY;
    }

    function handleEnd(e) {
        if (!aiming || gameOver) return;
        e.preventDefault();
        aiming = false;
        const dx = aimX - cannonX;
        const dy = aimY - cannonY;
        shoot(dx, dy);
    }

    canvas.addEventListener('mousedown', handleStart);
    canvas.addEventListener('mousemove', handleMove);
    canvas.addEventListener('mouseup', handleEnd);
    canvas.addEventListener('mouseleave', () => { aiming = false; });

    canvas.addEventListener('touchstart', handleStart, { passive: false });
    canvas.addEventListener('touchmove', handleMove, { passive: false });
    canvas.addEventListener('touchend', handleEnd, { passive: false });
    canvas.addEventListener('touchcancel', () => { aiming = false; });

    // Перезапуск по кнопке
    function restartGame() {
        initGrid();
        score = 0;
        successfulShots = 0;
        updateUI();
        gameOver = false;
        shooting = false;
        ball.active = false;
        shotsFired = 0;
        shotsBeforeDrop = 3 + Math.floor(Math.random() * 3);
        hideGameOver();
    }

    document.getElementById('manualRestart').addEventListener('click', restartGame);
    document.getElementById('playAgainBtn').addEventListener('click', restartGame);
})();
</script>
</body>
</html>
