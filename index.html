<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bubble Shooter · аркадный</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: #0b0f1a;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .game-container {
            width: 400px;
            max-width: 100%;
            background: #000;
            border-radius: 36px;
            padding: 20px 12px 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 0 0 2px #2a2f3a;
        }
        .canvas-container {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }
        canvas {
            background: #0b0f1a;
            border-radius: 24px;
            display: block;
            width: 100%;
            height: auto;
            border: 2px solid #2a2f3a;
            touch-action: none;
        }
        .score-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            color: #ddd;
        }
        .score-labels {
            display: flex;
            gap: 20px;
            font-size: 13px;
            font-weight: 500;
            color: #888;
            margin-left: 8px;
        }
        .score-labels span {
            position: relative;
        }
        .score-labels span::before {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 8px;
            background: #555;
        }
        .progress-bar {
            flex: 1;
            height: 8px;
            background: #222;
            border-radius: 20px;
            margin: 0 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f1c40f, #e67e22);
            border-radius: 20px;
            transition: width 0.2s ease;
        }
        .next-ball {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #111;
            padding: 6px 12px;
            border-radius: 30px;
            border: 1px solid #333;
        }
        .next-ball-label {
            font-size: 12px;
            color: #aaa;
        }
        .ball-preview {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            color: white;
            text-shadow: 0 1px 2px black;
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }
        .restart-btn {
            background: #2a2a2a;
            color: #888;
            border: 1px solid #3a3a3a;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            margin-left: 8px;
        }
        .restart-btn:hover {
            background: #3a3a3a;
            color: #fff;
        }
        .game-over-message {
            text-align: center;
            color: #e67e22;
            font-weight: bold;
            margin-top: 8px;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="canvas-container">
        <canvas id="gameCanvas" width="360" height="440"></canvas>
    </div>

    <div class="score-panel">
        <div class="score-labels">
            <span>0</span>
            <span>100</span>
            <span>300</span>
            <span>500</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="scoreProgress" style="width:0%"></div>
        </div>
        <div class="next-ball">
            <span class="next-ball-label">next</span>
            <div class="ball-preview" id="nextBallPreview">⚪</div>
        </div>
        <div class="restart-btn" id="restartBtn">↺</div>
    </div>
    <div id="gameOverMsg" class="game-over-message"></div>
</div>

<script>
(function() {
    // ---------- НАСТРОЙКИ ----------
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const COLS = 9;
    const ROWS = 12;
    const BALL_RADIUS = 18;
    const CELL_W = BALL_RADIUS * 2;
    const CELL_H = BALL_RADIUS * 1.65;

    const X_OFFSET = BALL_RADIUS;

    const COLORS = ['#e67e22', '#3498db', '#e74c3c', '#2ecc71', '#f1c40f', '#9b59b6'];

    const SPECIAL_TYPES = {
        BOMB: 'bomb',
        COLOR_CLEAR: 'color_clear',
        ROW_CLEAR: 'row_clear'
    };
    const SPECIAL_CHANCE = 0.12;

    let grid = [];
    let score = 0;
    let shooting = false;
    let ball = {
        x: 0, y: 0,
        vx: 0, vy: 0,
        type: 'normal',
        color: '',
        active: false
    };

    let aiming = false;
    let aimX = 0, aimY = 0;

    const cannonX = canvas.width / 2;
    const cannonY = canvas.height - 40;

    let nextBall = {
        type: 'normal',
        color: COLORS[0]
    };

    let shotsFired = 0;
    let shotsBeforeDrop = 3 + Math.floor(Math.random() * 3);
    let gameOver = false;

    // ---------- ИНИЦИАЛИЗАЦИЯ СЕТКИ (ВСЕ ВЕРХНИЕ РЯДЫ ЗАПОЛНЕНЫ ПОЛНОСТЬЮ) ----------
    function initGrid() {
        grid = [];
        for (let r = 0; r < ROWS; r++) {
            grid[r] = Array(COLS).fill(null);
        }
        // Заполняем верхние 3 ряда полностью случайными обычными шарами (без пустот)
        for (let r = 0; r < 3; r++) {
            for (let c = 0; c < COLS; c++) {
                grid[r][c] = {
                    type: 'normal',
                    color: COLORS[Math.floor(Math.random() * COLORS.length)]
                };
            }
        }
    }
    initGrid();

    function generateNextBall() {
        if (Math.random() < SPECIAL_CHANCE) {
            const types = [SPECIAL_TYPES.BOMB, SPECIAL_TYPES.COLOR_CLEAR, SPECIAL_TYPES.ROW_CLEAR];
            const type = types[Math.floor(Math.random() * types.length)];
            const color = COLORS[Math.floor(Math.random() * COLORS.length)];
            nextBall = { type, color };
        } else {
            nextBall = {
                type: 'normal',
                color: COLORS[Math.floor(Math.random() * COLORS.length)]
            };
        }
        updatePreview();
    }

    function updatePreview() {
        const preview = document.getElementById('nextBallPreview');
        preview.style.backgroundColor = nextBall.color;
        if (nextBall.type === 'normal') {
            preview.innerText = '';
        } else if (nextBall.type === SPECIAL_TYPES.BOMB) {
            preview.innerText = '💣';
        } else if (nextBall.type === SPECIAL_TYPES.COLOR_CLEAR) {
            preview.innerText = '🎨';
        } else if (nextBall.type === SPECIAL_TYPES.ROW_CLEAR) {
            preview.innerText = '↔️';
        }
    }

    generateNextBall();

    // ---------- ФУНКЦИИ СЕТКИ ----------
    function getBallXY(row, col) {
        const x = col * CELL_W + (row % 2 === 0 ? 0 : X_OFFSET) + BALL_RADIUS;
        const y = row * CELL_H + BALL_RADIUS + 15;
        return { x, y };
    }

    function findNearestFreeCell(x, y) {
        let minDist = Infinity;
        let best = null;
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (grid[r][c] !== null) continue;
                const { x: cx, y: cy } = getBallXY(r, c);
                const d = Math.hypot(x - cx, y - cy);
                if (d < minDist) {
                    minDist = d;
                    best = { row: r, col: c };
                }
            }
        }
        return best;
    }

    function checkCollision(ballX, ballY, vx, vy) {
        if (ballX - BALL_RADIUS < 0) return { type: 'wall', side: 'left', newVx: Math.abs(vx) };
        if (ballX + BALL_RADIUS > canvas.width) return { type: 'wall', side: 'right', newVx: -Math.abs(vx) };
        if (ballY - BALL_RADIUS < 0) return { type: 'ceiling', x: ballX, y: ballY };

        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (grid[r][c] === null) continue;
                const { x: cx, y: cy } = getBallXY(r, c);
                const dist = Math.hypot(ballX - cx, ballY - cy);
                if (dist < 2 * BALL_RADIUS - 2) {
                    return { type: 'ball', row: r, col: c, x: cx, y: cy };
                }
            }
        }
        return null;
    }

    function findCluster(row, col, color) {
        if (!grid[row]?.[col] || grid[row][col].color !== color) return [];
        const visited = Array(ROWS).fill().map(() => Array(COLS).fill(false));
        const queue = [[row, col]];
        const cluster = [];
        while (queue.length) {
            const [r, c] = queue.shift();
            if (visited[r][c]) continue;
            visited[r][c] = true;
            if (grid[r][c] && grid[r][c].color === color) {
                cluster.push([r, c]);
                const neighbors = [
                    [r-1, c], [r+1, c], [r, c-1], [r, c+1],
                    [r-1, c + (r%2===0 ? -1 : 1)], [r+1, c + (r%2===0 ? -1 : 1)]
                ];
                for (let [nr, nc] of neighbors) {
                    if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && !visited[nr][nc] && grid[nr][nc]?.color === color) {
                        queue.push([nr, nc]);
                    }
                }
            }
        }
        return cluster;
    }

    function removeFloating() {
        const visited = Array(ROWS).fill().map(() => Array(COLS).fill(false));
        const queue = [];

        for (let c = 0; c < COLS; c++) {
            if (grid[0][c] !== null) {
                queue.push([0, c]);
                visited[0][c] = true;
            }
        }

        while (queue.length) {
            const [r, c] = queue.shift();
            const neighbors = [
                [r-1, c], [r+1, c], [r, c-1], [r, c+1],
                [r-1, c + (r%2===0 ? -1 : 1)], [r+1, c + (r%2===0 ? -1 : 1)]
            ];
            for (let [nr, nc] of neighbors) {
                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && !visited[nr][nc] && grid[nr][nc] !== null) {
                    visited[nr][nc] = true;
                    queue.push([nr, nc]);
                }
            }
        }

        let removed = 0;
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (grid[r][c] !== null && !visited[r][c]) {
                    grid[r][c] = null;
                    removed++;
                }
            }
        }
        return removed;
    }

    function applySpecialEffect(row, col, type, color) {
        let targets = [];

        if (type === SPECIAL_TYPES.BOMB) {
            const radius = 4;
            for (let r = Math.max(0, row - radius); r <= Math.min(ROWS-1, row + radius); r++) {
                for (let c = Math.max(0, col - radius); c <= Math.min(COLS-1, col + radius); c++) {
                    if (grid[r][c] !== null) {
                        targets.push([r, c]);
                    }
                }
            }
        } else if (type === SPECIAL_TYPES.COLOR_CLEAR) {
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (grid[r]?.[c]?.color === color) {
                        targets.push([r, c]);
                    }
                }
            }
        } else if (type === SPECIAL_TYPES.ROW_CLEAR) {
            for (let c = 0; c < COLS; c++) {
                if (grid[row]?.[c] !== null) {
                    targets.push([row, c]);
                }
            }
        }

        for (let [r, c] of targets) {
            grid[r][c] = null;
        }
        return targets.length;
    }

    // Обработка вставки шара (теперь возвращает количество заработанных очков)
    function handleShot(targetRow, targetCol, ballData) {
        if (targetRow === null || targetCol === null) return 0;
        if (grid[targetRow][targetCol] !== null) return 0;

        let pointsEarned = 0;
        grid[targetRow][targetCol] = { type: ballData.type, color: ballData.color };

        if (ballData.type !== 'normal') {
            pointsEarned += applySpecialEffect(targetRow, targetCol, ballData.type, ballData.color) * 10;
            if (grid[targetRow][targetCol] !== null) {
                grid[targetRow][targetCol] = null;
            }
        }

        if (ballData.type === 'normal') {
            const cluster = findCluster(targetRow, targetCol, ballData.color);
            if (cluster.length >= 3) {
                for (let [r, c] of cluster) {
                    grid[r][c] = null;
                    pointsEarned += 10;
                }
            }
        }

        pointsEarned += removeFloating() * 10;
        return pointsEarned;
    }

    // Завершение выстрела (вызывается после остановки шара)
    function finishShot(targetRow, targetCol, ballData) {
        const earned = handleShot(targetRow, targetCol, ballData);
        if (earned > 0) {
            score += earned;
            if (score > 500) score = 500;
            document.getElementById('scoreProgress').style.width = (score / 500 * 100) + '%';
        }

        // Увеличиваем счётчик выстрелов ТОЛЬКО после обработки
        shotsFired++;
        if (shotsFired >= shotsBeforeDrop) {
            dropRows();
            shotsFired = 0;
            shotsBeforeDrop = 3 + Math.floor(Math.random() * 3);
        }

        // Проверка на поражение (после спуска)
        for (let c = 0; c < COLS; c++) {
            if (grid[ROWS-1][c] !== null) {
                gameOver = true;
                document.getElementById('gameOverMsg').innerText = '💥 GAME OVER 💥';
                break;
            }
        }
    }

    // Новая строка (полностью заполненная)
    function dropRows() {
        // Сдвигаем всё вниз
        for (let r = ROWS - 1; r > 0; r--) {
            grid[r] = [...grid[r-1]];
        }
        // Новая верхняя строка: все ячейки заполнены случайными обычными шарами
        grid[0] = Array(COLS).fill(null).map(() => ({
            type: 'normal',
            color: COLORS[Math.floor(Math.random() * COLORS.length)]
        }));
    }

    function shoot(dx, dy) {
        if (shooting || gameOver) return;
        const len = Math.hypot(dx, dy);
        if (len < 0.001) return;
        const speed = 5;
        const vx = (dx / len) * speed;
        const vy = (dy / len) * speed;

        ball = {
            x: cannonX,
            y: cannonY - 10,
            vx: vx,
            vy: vy,
            type: nextBall.type,
            color: nextBall.color,
            active: true
        };
        shooting = true;

        // Генерируем следующий шар сразу
        generateNextBall();
    }

    function updateAnimation() {
        if (!shooting || !ball.active || gameOver) return;

        ball.x += ball.vx;
        ball.y += ball.vy;

        const collision = checkCollision(ball.x, ball.y, ball.vx, ball.vy);
        if (collision) {
            if (collision.type === 'wall') {
                ball.vx = collision.newVx;
            } else if (collision.type === 'ceiling') {
                const cell = findNearestFreeCell(ball.x, ball.y);
                ball.active = false;
                shooting = false;
                if (cell) {
                    finishShot(cell.row, cell.col, ball);
                }
            } else if (collision.type === 'ball') {
                const cell = findNearestFreeCell(ball.x, ball.y);
                ball.active = false;
                shooting = false;
                if (cell) {
                    finishShot(cell.row, cell.col, ball);
                }
            }
        }

        if (ball.y - BALL_RADIUS > canvas.height) {
            ball.active = false;
            shooting = false;
        }
    }

    // Отрисовка (только шары, никакой сетки)
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Прицел
        if (aiming && !shooting && !gameOver) {
            ctx.beginPath();
            ctx.moveTo(cannonX, cannonY - 10);
            ctx.lineTo(aimX, aimY);
            ctx.strokeStyle = '#fff8';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // Шары в сетке
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (grid[r][c]) {
                    const { x, y } = getBallXY(r, c);
                    ctx.beginPath();
                    ctx.arc(x, y, BALL_RADIUS-1, 0, 2*Math.PI);
                    ctx.fillStyle = grid[r][c].color;
                    ctx.shadowColor = '#fff3';
                    ctx.shadowBlur = 8;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();

                    // Спецсимволы в сетке не появляются, но на всякий случай
                    if (grid[r][c].type !== 'normal') {
                        ctx.font = 'bold 14px monospace';
                        ctx.fillStyle = 'white';
                        ctx.shadowColor = 'black';
                        ctx.shadowBlur = 4;
                        ctx.fillText(grid[r][c].type === SPECIAL_TYPES.BOMB ? '💣' : grid[r][c].type === SPECIAL_TYPES.COLOR_CLEAR ? '🎨' : '↔️', x-10, y+6);
                        ctx.shadowBlur = 0;
                    }
                }
            }
        }

        // Пушка
        ctx.fillStyle = '#456';
        ctx.beginPath();
        ctx.moveTo(cannonX - 18, cannonY - 10);
        ctx.lineTo(cannonX + 18, cannonY - 10);
        ctx.lineTo(cannonX, cannonY + 10);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = '#789';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Летящий шар
        if (ball.active) {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, BALL_RADIUS-1, 0, 2*Math.PI);
            ctx.fillStyle = ball.color;
            ctx.shadowBlur = 12;
            ctx.shadowColor = '#fff9';
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();
            if (ball.type !== 'normal') {
                ctx.font = 'bold 16px monospace';
                ctx.fillStyle = 'white';
                ctx.shadowColor = 'black';
                ctx.shadowBlur = 4;
                ctx.fillText(ball.type === SPECIAL_TYPES.BOMB ? '💣' : ball.type === SPECIAL_TYPES.COLOR_CLEAR ? '🎨' : '↔️', ball.x-12, ball.y+8);
                ctx.shadowBlur = 0;
            }
        }
    }

    function gameLoop() {
        updateAnimation();
        draw();
        requestAnimationFrame(gameLoop);
    }
    gameLoop();

    // ---------- СОБЫТИЯ ПРИЦЕЛИВАНИЯ ----------
    function handleStart(e) {
        e.preventDefault();
        if (gameOver) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        aimX = (clientX - rect.left) * scaleX;
        aimY = (clientY - rect.top) * scaleY;
        aiming = true;
    }

    function handleMove(e) {
        if (!aiming || gameOver) return;
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        aimX = (clientX - rect.left) * scaleX;
        aimY = (clientY - rect.top) * scaleY;
    }

    function handleEnd(e) {
        if (!aiming || gameOver) return;
        e.preventDefault();
        aiming = false;
        const dx = aimX - cannonX;
        const dy = aimY - cannonY;
        shoot(dx, dy);
    }

    canvas.addEventListener('mousedown', handleStart);
    canvas.addEventListener('mousemove', handleMove);
    canvas.addEventListener('mouseup', handleEnd);
    canvas.addEventListener('mouseleave', () => { aiming = false; });

    canvas.addEventListener('touchstart', handleStart, { passive: false });
    canvas.addEventListener('touchmove', handleMove, { passive: false });
    canvas.addEventListener('touchend', handleEnd, { passive: false });
    canvas.addEventListener('touchcancel', () => { aiming = false; });

    // Перезапуск
    document.getElementById('restartBtn').addEventListener('click', () => {
        initGrid();
        score = 0;
        document.getElementById('scoreProgress').style.width = '0%';
        gameOver = false;
        document.getElementById('gameOverMsg').innerText = '';
        shooting = false;
        ball.active = false;
        shotsFired = 0;
        shotsBeforeDrop = 3 + Math.floor(Math.random() * 3);
        generateNextBall();
    });
})();
</script>
</body>
</html>
