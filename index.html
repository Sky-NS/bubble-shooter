<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Shooter · главная</title>
    <!-- Firebase SDK (compat‑версия 12.10.0) -->
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', cursive, sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #ff9a9e, #fad0c4, #fad0c4);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }

        /* Пузырьки на фоне */
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: none;
            bottom: -100px;
            animation: rise 8s infinite ease-in;
        }
        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0.8; }
            100% { transform: translateY(-120vh) scale(1.5); opacity: 0; }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3), inset 0 0 20px rgba(255, 255, 255, 0.5);
            padding: 40px 30px;
            width: 100%;
            max-width: 500px;
            transition: all 0.3s;
            color: #2c3e50;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.5);
        }

        h1 {
            font-size: 3rem;
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(5px 5px 10px rgba(0,0,0,0.2));
        }

        .input-group {
            margin: 25px 0;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px 25px;
            font-size: 1.3rem;
            border: none;
            border-radius: 60px;
            background: rgba(255, 255, 255, 0.8);
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.1), 0 5px 0 #ccc;
            text-align: center;
            outline: none;
            transition: 0.2s;
        }
        input[type="text"]:focus {
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.1), 0 5px 0 #f39c12;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 18px 20px;
            font-size: 1.8rem;
            font-weight: bold;
            border: none;
            border-radius: 60px;
            background: linear-gradient(145deg, #f1c40f, #e67e22);
            color: white;
            text-shadow: 2px 2px 0 #b45d1a;
            box-shadow: 0 15px 0 #b45d1a, 0 5px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: 0.1s;
            margin: 10px 0;
        }
        .btn:active {
            transform: translateY(10px);
            box-shadow: 0 5px 0 #b45d1a, 0 5px 20px rgba(0,0,0,0.3);
        }
        .btn.secondary {
            background: linear-gradient(145deg, #3498db, #2980b9);
            box-shadow: 0 15px 0 #1f618d;
            text-shadow: 2px 2px 0 #1f618d;
        }
        .menu-btn {
            font-size: 2rem;
            margin: 15px 0;
        }
        .error-msg {
            color: #e74c3c;
            font-size: 1.2rem;
            margin-top: 10px;
            text-align: center;
            text-shadow: 1px 1px 0 white;
        }
        .user-info {
            font-size: 1.5rem;
            text-align: right;
            margin-bottom: 20px;
            color: #2c3e50;
        }
        .settings-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 2rem;
            margin: 25px 0;
            background: rgba(255,255,255,0.3);
            padding: 15px 25px;
            border-radius: 60px;
        }
        .settings-item input[type="checkbox"] {
            width: 40px;
            height: 40px;
            transform: scale(1.5);
            accent-color: #e67e22;
        }
        .scores-table {
            width: 100%;
            font-size: 1.6rem;
            border-collapse: collapse;
        }
        .scores-table th {
            background: rgba(0,0,0,0.1);
            padding: 10px;
        }
        .scores-table td {
            padding: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            text-align: center;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Пузырьки будут добавлены скриптом -->
    <div id="bubbles-container"></div>

    <div class="glass-panel" id="app">
        <!-- Динамическое содержимое будет вставлено скриптом -->
    </div>

    <script>
        // 1. Ваша конфигурация Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAb0WLf9uyTXhs6eGw19i_42gUIZZCbP9c",
            authDomain: "bubble-shooter-game-6169e.firebaseapp.com",
            projectId: "bubble-shooter-game-6169e",
            storageBucket: "bubble-shooter-game-6169e.firebasestorage.app",
            messagingSenderId: "260116679476",
            appId: "1:260116679476:web:bf0b75316ce263d483f361"
        };

        // 2. Инициализация Firebase (compat-метод)
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 3. Глобальные переменные
        let currentUser = null; // будет хранить { id, name, settings, highScore }

        // 4. Генерация фоновых пузырьков
        function createBubbles() {
            const container = document.getElementById('bubbles-container');
            for (let i = 0; i < 15; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                const size = Math.random() * 100 + 30;
                bubble.style.width = size + 'px';
                bubble.style.height = size + 'px';
                bubble.style.left = Math.random() * 100 + '%';
                bubble.style.animationDelay = Math.random() * 5 + 's';
                bubble.style.animationDuration = Math.random() * 5 + 8 + 's';
                container.appendChild(bubble);
            }
        }
        createBubbles();

        // 5. Функция отрисовки экранов
        const appDiv = document.getElementById('app');

        function showLoginScreen(errorMsg = '') {
            appDiv.innerHTML = `
                <h1>🍭 BUBBLE</h1>
                <div class="input-group">
                    <input type="text" id="usernameInput" placeholder="Твоё имя" maxlength="16" minlength="3">
                </div>
                <button class="btn" id="loginBtn">Войти</button>
                <div class="error-msg">${errorMsg}</div>
            `;
            document.getElementById('loginBtn').addEventListener('click', handleLogin);
        }

        async function handleLogin() {
            const name = document.getElementById('usernameInput').value.trim();
            if (name.length < 3 || name.length > 16) {
                showLoginScreen('Имя должно быть от 3 до 16 символов');
                return;
            }
            try {
                const usersRef = db.collection('users');
                const snapshot = await usersRef.where('name', '==', name).get();
                if (!snapshot.empty) {
                    showLoginScreen('Это имя уже занято, выбери другое');
                    return;
                }
                // Создаём нового пользователя
                const newUser = {
                    name: name,
                    settings: {
                        music: true,
                        sound: true
                    },
                    highScore: 0,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                };
                const docRef = await usersRef.add(newUser);
                currentUser = { id: docRef.id, ...newUser };
                showMainMenu();
            } catch (error) {
                console.error(error);
                showLoginScreen('Ошибка соединения, попробуй ещё раз');
            }
        }

        function showMainMenu() {
            appDiv.innerHTML = `
                <div class="user-info">👋 Привет, ${currentUser.name}</div>
                <button class="btn menu-btn" id="playBtn">🎮 Начать игру</button>
                <button class="btn menu-btn secondary" id="recordsBtn">🏆 Рекорды</button>
                <button class="btn menu-btn secondary" id="settingsBtn">⚙️ Настройки</button>
                <button class="btn secondary" id="logoutBtn" style="font-size:1.5rem; margin-top:30px;">🚪 Выйти</button>
            `;
            document.getElementById('playBtn').addEventListener('click', () => alert('Запуск игры — скоро!'));
            document.getElementById('recordsBtn').addEventListener('click', showRecords);
            document.getElementById('settingsBtn').addEventListener('click', showSettings);
            document.getElementById('logoutBtn').addEventListener('click', () => {
                currentUser = null;
                showLoginScreen();
            });
        }

        async function showSettings() {
            if (!currentUser) return;
            const userDoc = await db.collection('users').doc(currentUser.id).get();
            const settings = userDoc.data().settings || { music: true, sound: true };
            currentUser.settings = settings;

            appDiv.innerHTML = `
                <h2>⚙️ Настройки</h2>
                <div class="settings-item">
                    <span>🎵 Музыка</span>
                    <input type="checkbox" id="musicCheck" ${settings.music ? 'checked' : ''}>
                </div>
                <div class="settings-item">
                    <span>🔊 Звуки</span>
                    <input type="checkbox" id="soundCheck" ${settings.sound ? 'checked' : ''}>
                </div>
                <button class="btn" id="saveSettingsBtn">Сохранить</button>
                <button class="btn secondary" id="backToMenuBtn">Назад</button>
            `;
            document.getElementById('saveSettingsBtn').addEventListener('click', saveSettings);
            document.getElementById('backToMenuBtn').addEventListener('click', showMainMenu);
        }

        async function saveSettings() {
            const music = document.getElementById('musicCheck').checked;
            const sound = document.getElementById('soundCheck').checked;
            const newSettings = { music, sound };
            await db.collection('users').doc(currentUser.id).update({
                settings: newSettings
            });
            currentUser.settings = newSettings;
            alert('Настройки сохранены!');
            showMainMenu();
        }

        async function showRecords() {
            const snapshot = await db.collection('users')
                .orderBy('highScore', 'desc')
                .limit(10)
                .get();
            let rows = '';
            snapshot.forEach(doc => {
                const data = doc.data();
                rows += `<tr><td>${data.name}</td><td>${data.highScore || 0}</td></tr>`;
            });
            appDiv.innerHTML = `
                <h2>🏆 Лучшие игроки</h2>
                <table class="scores-table">
                    <tr><th>Имя</th><th>Счёт</th></tr>
                    ${rows}
                </table>
                <button class="btn secondary" id="backBtn" style="margin-top:20px;">Назад</button>
            `;
            document.getElementById('backBtn').addEventListener('click', showMainMenu);
        }

        // Стартовый экран
        showLoginScreen();
    </script>
</body>
</html>
