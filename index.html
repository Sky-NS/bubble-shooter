<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bubble Shooter · спуск + новые ряды</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: #0b0f1a;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .game-wrapper {
            width: 400px;
            max-width: 100%;
            background: #000;
            border-radius: 36px;
            padding: 5px 12px 20px; /* уменьшен верхний отступ */
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 0 0 2px #2a2f3a;
            position: relative;
        }
        .canvas-container {
            display: flex;
            justify-content: center;
            margin-bottom: 5px; /* убрали лишний отступ */
        }
        canvas {
            background: #0b0f1a;
            border-radius: 24px;
            display: block;
            width: 100%;
            height: auto;
            border: 2px solid #2a2f3a;
            touch-action: none;
        }
        .queue-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            background: #111;
            border-radius: 40px;
            padding: 10px 20px;
            margin-top: 5px;
            border: 1px solid #333;
        }
        .ball-item {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 3px solid #555;
            transition: border 0.2s;
        }
        .ball-item.current {
            border-color: #f1c40f;
            transform: scale(1.1);
        }
        .restart-btn {
            background: #2a2a2a;
            color: #888;
            border: 1px solid #3a3a3a;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
            width: fit-content;
            margin-left: auto;
        }
        .restart-btn:hover {
            background: #3a3a3a;
            color: #fff;
        }
        .game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            border-radius: 36px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 10;
            backdrop-filter: blur(4px);
            padding: 20px;
            text-align: center;
        }
        .game-overlay.hidden {
            display: none;
        }
        .final-score {
            font-size: 32px;
            font-weight: bold;
            color: #f1c40f;
            margin-bottom: 10px;
        }
        .record {
            font-size: 24px;
            color: #3498db;
            margin-bottom: 30px;
        }
        .play-again {
            background: #e67e22;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            box-shadow: 0 5px 0 #b45d1a;
            transition: 0.1s;
        }
        .play-again:active {
            transform: translateY(5px);
            box-shadow: none;
        }
        .ad-placeholder {
            background: #2c3e50;
            color: #bdc3c7;
            padding: 10px;
            border-radius: 12px;
            width: 100%;
            font-size: 14px;
            border: 1px solid #7f8c8d;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="canvas-container">
        <canvas id="gameCanvas" width="360" height="440"></canvas>
    </div>

    <!-- Очередь шаров -->
    <div class="queue-container" id="queueContainer">
        <div class="ball-item current" id="ball0" style="background:#e67e22;"></div>
        <div class="ball-item" id="ball1" style="background:#3498db;"></div>
        <div class="ball-item" id="ball2" style="background:#2ecc71;"></div>
    </div>

    <div class="restart-btn" id="manualRestart">↺ Новая игра</div>

    <!-- Game Over overlay -->
    <div id="gameOverlay" class="game-overlay hidden">
        <div class="final-score" id="finalScore">0</div>
        <div class="record" id="recordDisplay">0</div>
        <button class="play-again" id="playAgainBtn">Сыграть заново</button>
        <div class="ad-placeholder">Здесь могла бы быть реклама, но с этой игры не заработать денег</div>
    </div>
</div>

<script>
(function() {
    // ---------- НАСТРОЙКИ ----------
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const COLS = 9;
    const ROWS = 12;
    const BALL_RADIUS = 18;
    const CELL_W = BALL_RADIUS * 2;
    const CELL_H = BALL_RADIUS * 1.65;
    const X_OFFSET = BALL_RADIUS;

    const COLORS = ['#e67e22', '#3498db', '#2ecc71', '#e74c3c', '#9b59b6'];

    const FALL_SPEED = 0.12;          // медленный спуск
    const SHOTS_PER_NEW_ROW = 5;       // новая строка каждые 5 выстрелов

    let grid = [];
    let fallOffset = 0;

    let score = 0;
    let successfulShots = 0;        // комбо
    let shooting = false;
    let ball = {
        x: 0, y: 0,
        vx: 0, vy: 0,
        color: '',
        active: false
    };

    let aiming = false;
    let aimX = 0, aimY = 0;

    const cannonX = canvas.width / 2;
    const cannonY = canvas.height - 40;

    let gameOver = false;

    // Очередь шаров (3 элемента)
    let ballQueue = [];

    // Счётчик выстрелов для появления новых строк
    let shotsFired = 0;

    // Рекорд
    let record = localStorage.getItem('bubbleRecord') ? parseInt(localStorage.getItem('bubbleRecord')) : 0;
    document.getElementById('recordDisplay').innerText = record;

    // ---------- ИНИЦИАЛИЗАЦИЯ (случайное число рядов от 1 до 10) ----------
    function initGrid() {
        grid = [];
        for (let r = 0; r < ROWS; r++) {
            grid[r] = Array(COLS).fill(null);
        }
        const initialRows = Math.floor(Math.random() * 10) + 1; // от 1 до 10
        for (let r = 0; r < initialRows; r++) {
            for (let c = 0; c < COLS; c++) {
                grid[r][c] = COLORS[Math.floor(Math.random() * COLORS.length)];
            }
        }
        fallOffset = 0;
        shotsFired = 0;
    }
    initGrid();

    function initQueue() {
        ballQueue = [];
        for (let i = 0; i < 3; i++) {
            ballQueue.push(COLORS[Math.floor(Math.random() * COLORS.length)]);
        }
        updateQueueDisplay();
    }
    initQueue();

    function updateQueueDisplay() {
        document.getElementById('ball0').style.backgroundColor = ballQueue[0];
        document.getElementById('ball1').style.backgroundColor = ballQueue[1];
        document.getElementById('ball2').style.backgroundColor = ballQueue[2];
    }

    function shiftQueue() {
        ballQueue.shift();
        ballQueue.push(COLORS[Math.floor(Math.random() * COLORS.length)]);
        updateQueueDisplay();
    }

    // ---------- ФУНКЦИИ СЕТКИ ----------
    function getBallXY(row, col) {
        const x = col * CELL_W + (row % 2 === 0 ? 0 : X_OFFSET) + BALL_RADIUS;
        const y = row * CELL_H + BALL_RADIUS + 15 + fallOffset;
        return { x, y };
    }

    function findNearestFreeCell(x, y) {
        const adjustedY = y - fallOffset;
        let minDist = Infinity;
        let best = null;
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (grid[r][c] !== null) continue;
                const baseY = r * CELL_H + BALL_RADIUS + 15;
                const cx = c * CELL_W + (r % 2 === 0 ? 0 : X_OFFSET) + BALL_RADIUS;
                const d = Math.hypot(x - cx, y - (baseY + fallOffset));
                if (d < minDist) {
                    minDist = d;
                    best = { row: r, col: c };
                }
            }
        }
        return best;
    }

    function checkCollision(ballX, ballY, vx, vy) {
        if (ballX - BALL_RADIUS < 0) return { type: 'wall', side: 'left', newVx: Math.abs(vx) };
        if (ballX + BALL_RADIUS > canvas.width) return { type: 'wall', side: 'right', newVx: -Math.abs(vx) };
        if (ballY - BALL_RADIUS < 0) return { type: 'ceiling', x: ballX, y: ballY };

        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (grid[r][c] === null) continue;
                const { x: cx, y: cy } = getBallXY(r, c);
                const dist = Math.hypot(ballX - cx, ballY - cy);
                if (dist < 2 * BALL_RADIUS - 2) {
                    return { type: 'ball', row: r, col: c, x: cx, y: cy };
                }
            }
        }
        return null;
    }

    function findCluster(row, col, color) {
        if (!grid[row]?.[col] || grid[row][col] !== color) return [];
        const visited = Array(ROWS).fill().map(() => Array(COLS).fill(false));
        const queue = [[row, col]];
        const cluster = [];
        while (queue.length) {
            const [r, c] = queue.shift();
            if (visited[r][c]) continue;
            visited[r][c] = true;
            if (grid[r][c] === color) {
                cluster.push([r, c]);
                const neighbors = [
                    [r-1, c], [r+1, c], [r, c-1], [r, c+1],
                    [r-1, c + (r%2===0 ? -1 : 1)], [r+1, c + (r%2===0 ? -1 : 1)]
                ];
                for (let [nr, nc] of neighbors) {
                    if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && !visited[nr][nc] && grid[nr][nc] === color) {
                        queue.push([nr, nc]);
                    }
                }
            }
        }
        return cluster;
    }

    function removeFloating() {
        const visited = Array(ROWS).fill().map(() => Array(COLS).fill(false));
        const queue = [];

        for (let c = 0; c < COLS; c++) {
            if (grid[0][c] !== null) {
                queue.push([0, c]);
                visited[0][c] = true;
            }
        }

        while (queue.length) {
            const [r, c] = queue.shift();
            const neighbors = [
                [r-1, c], [r+1, c], [r, c-1], [r, c+1],
                [r-1, c + (r%2===0 ? -1 : 1)], [r+1, c + (r%2===0 ? -1 : 1)]
            ];
            for (let [nr, nc] of neighbors) {
                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && !visited[nr][nc] && grid[nr][nc] !== null) {
                    visited[nr][nc] = true;
                    queue.push([nr, nc]);
                }
            }
        }

        let removed = [];
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (grid[r][c] !== null && !visited[r][c]) {
                    removed.push({ row: r, col: c, color: grid[r][c] });
                    grid[r][c] = null;
                }
            }
        }
        return removed;
    }

    // Добавление новой строки сверху (полностью заполненной)
    function addNewRow() {
        // Сдвигаем все строки вниз
        for (let r = ROWS - 1; r > 0; r--) {
            grid[r] = [...grid[r-1]];
        }
        // Новая верхняя строка
        grid[0] = Array(COLS).fill(null).map(() => COLORS[Math.floor(Math.random() * COLORS.length)]);
    }

    // Обработка выстрела
    function processShot(targetRow, targetCol, ballColor) {
        if (targetRow === null || targetCol === null) return;

        grid[targetRow][targetCol] = ballColor;

        let totalDestroyed = 0;
        let pointsThisShot = 0;

        const cluster = findCluster(targetRow, targetCol, ballColor);
        if (cluster.length >= 3) {
            for (let [r, c] of cluster) {
                grid[r][c] = null;
                totalDestroyed++;
                pointsThisShot += 10;
            }
        }

        const floating = removeFloating();
        floating.forEach(item => {
            totalDestroyed++;
            pointsThisShot += 10;
        });

        if (totalDestroyed > 0) {
            const currentMultiplier = successfulShots + 1;
            score += pointsThisShot * currentMultiplier;
            successfulShots++;
        } else {
            successfulShots = 0;
        }

        if (score > record) {
            record = score;
            localStorage.setItem('bubbleRecord', record);
        }
    }

    // Проверка поражения
    function checkGameOver() {
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (grid[r][c] !== null) {
                    const { y } = getBallXY(r, c);
                    if (y + BALL_RADIUS >= canvas.height) {
                        return true;
                    }
                }
            }
        }
        return false;
    }

    // Выстрел
    function shoot(dx, dy) {
        if (shooting || gameOver) return;
        const len = Math.hypot(dx, dy);
        if (len < 0.001) return;
        const speed = 5;
        const vx = (dx / len) * speed;
        const vy = (dy / len) * speed;

        ball = {
            x: cannonX,
            y: cannonY - 10,
            vx: vx,
            vy: vy,
            color: ballQueue[0],
            active: true
        };
        shooting = true;
    }

    // Завершение выстрела
    function finishShot(targetRow, targetCol, ballColor) {
        processShot(targetRow, targetCol, ballColor);
        shiftQueue();

        // Увеличиваем счётчик выстрелов и, если нужно, добавляем новую строку
        shotsFired++;
        if (shotsFired >= SHOTS_PER_NEW_ROW) {
            addNewRow();
            shotsFired = 0;
        }

        if (checkGameOver()) {
            gameOver = true;
            showGameOver();
        }
    }

    function showGameOver() {
        document.getElementById('finalScore').innerText = score;
        document.getElementById('recordDisplay').innerText = record;
        document.getElementById('gameOverlay').classList.remove('hidden');
    }

    function hideGameOver() {
        document.getElementById('gameOverlay').classList.add('hidden');
    }

    // Анимация
    function updateAnimation() {
        if (gameOver) return;

        fallOffset += FALL_SPEED;

        if (checkGameOver()) {
            gameOver = true;
            showGameOver();
            return;
        }

        if (!shooting || !ball.active) return;

        ball.x += ball.vx;
        ball.y += ball.vy;

        const collision = checkCollision(ball.x, ball.y, ball.vx, ball.vy);
        if (collision) {
            if (collision.type === 'wall') {
                ball.vx = collision.newVx;
            } else if (collision.type === 'ceiling') {
                const cell = findNearestFreeCell(ball.x, ball.y);
                ball.active = false;
                shooting = false;
                if (cell) {
                    finishShot(cell.row, cell.col, ball.color);
                }
            } else if (collision.type === 'ball') {
                const cell = findNearestFreeCell(ball.x, ball.y);
                ball.active = false;
                shooting = false;
                if (cell) {
                    finishShot(cell.row, cell.col, ball.color);
                }
            }
        }

        if (ball.y - BALL_RADIUS > canvas.height) {
            ball.active = false;
            shooting = false;
        }
    }

    // Отрисовка (счёт и комбо на самом холсте)
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Прицел
        if (aiming && !shooting && !gameOver) {
            ctx.beginPath();
            ctx.moveTo(cannonX, cannonY - 10);
            ctx.lineTo(aimX, aimY);
            ctx.strokeStyle = '#fff8';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // Шары в сетке
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (grid[r][c]) {
                    const { x, y } = getBallXY(r, c);
                    ctx.beginPath();
                    ctx.arc(x, y, BALL_RADIUS-1, 0, 2*Math.PI);
                    ctx.fillStyle = grid[r][c];
                    ctx.shadowColor = '#fff3';
                    ctx.shadowBlur = 8;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                }
            }
        }

        // Пушка
        ctx.fillStyle = '#456';
        ctx.beginPath();
        ctx.moveTo(cannonX - 18, cannonY - 10);
        ctx.lineTo(cannonX + 18, cannonY - 10);
        ctx.lineTo(cannonX, cannonY + 10);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = '#789';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Летящий шар
        if (ball.active) {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, BALL_RADIUS-1, 0, 2*Math.PI);
            ctx.fillStyle = ball.color;
            ctx.shadowBlur = 12;
            ctx.shadowColor = '#fff9';
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        // Отображение счёта и комбо на холсте (полупрозрачный фон)
        ctx.font = 'bold 20px "Segoe UI", Roboto';
        ctx.shadowBlur = 0;
        // Счёт слева
        ctx.fillStyle = '#2ecc71';
        ctx.fillText(`${score}`, 20, 40);
        // Комбо справа
        ctx.fillStyle = '#f39c12';
        ctx.fillText(`x${successfulShots}`, canvas.width - 80, 40);
    }

    function gameLoop() {
        updateAnimation();
        draw();
        requestAnimationFrame(gameLoop);
    }
    gameLoop();

    // ---------- СОБЫТИЯ ПРИЦЕЛИВАНИЯ ----------
    function handleStart(e) {
        e.preventDefault();
        if (gameOver) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        aimX = (clientX - rect.left) * scaleX;
        aimY = (clientY - rect.top) * scaleY;
        aiming = true;
    }

    function handleMove(e) {
        if (!aiming || gameOver) return;
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        aimX = (clientX - rect.left) * scaleX;
        aimY = (clientY - rect.top) * scaleY;
    }

    function handleEnd(e) {
        if (!aiming || gameOver) return;
        e.preventDefault();
        aiming = false;
        const dx = aimX - cannonX;
        const dy = aimY - cannonY;
        shoot(dx, dy);
    }

    canvas.addEventListener('mousedown', handleStart);
    canvas.addEventListener('mousemove', handleMove);
    canvas.addEventListener('mouseup', handleEnd);
    canvas.addEventListener('mouseleave', () => { aiming = false; });

    canvas.addEventListener('touchstart', handleStart, { passive: false });
    canvas.addEventListener('touchmove', handleMove, { passive: false });
    canvas.addEventListener('touchend', handleEnd, { passive: false });
    canvas.addEventListener('touchcancel', () => { aiming = false; });

    // Перезапуск
    function restartGame() {
        initGrid();
        initQueue();
        score = 0;
        successfulShots = 0;
        gameOver = false;
        shooting = false;
        ball.active = false;
        fallOffset = 0;
        shotsFired = 0;
        hideGameOver();
    }

    document.getElementById('manualRestart').addEventListener('click', restartGame);
    document.getElementById('playAgainBtn').addEventListener('click', restartGame);
})();
</script>
</body>
</html>
