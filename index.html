<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bubble Shooter · Главная</title>
    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', cursive, sans-serif;
        }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #ff9a9e, #fad0c4, #fad0c4);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: none;
            bottom: -100px;
            animation: rise 8s infinite ease-in;
        }
        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0.8; }
            100% { transform: translateY(-120vh) scale(1.5); opacity: 0; }
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3), inset 0 0 20px rgba(255, 255, 255, 0.5);
            padding: 20px 20px; /* уменьшено с 40px 30px */
            width: 100%;
            max-width: 500px;
            color: #2c3e50;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.5);
        }
        h1 {
            font-size: 3rem;
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(5px 5px 10px rgba(0,0,0,0.2));
        }
        h2 {
            font-size: 2rem;
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .input-group {
            margin: 20px 0;
            text-align: left;
        }
        input[type="email"], input[type="password"], input[type="text"] {
            width: 100%;
            padding: 15px 25px;
            font-size: 1.2rem;
            border: none;
            border-radius: 60px;
            background: rgba(255, 255, 255, 0.8);
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.1), 0 5px 0 #ccc;
            outline: none;
            transition: 0.2s;
            margin-bottom: 15px;
        }
        input:focus {
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.1), 0 5px 0 #f39c12;
        }
        .btn {
            display: inline-block;
            width: 100%;
            padding: 15px 20px;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            border-radius: 60px;
            background: linear-gradient(145deg, #f1c40f, #e67e22);
            color: white;
            text-shadow: 2px 2px 0 #b45d1a;
            box-shadow: 0 10px 0 #b45d1a, 0 5px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: 0.1s;
            margin: 10px 0;
        }
        .btn:active {
            transform: translateY(5px);
            box-shadow: 0 5px 0 #b45d1a, 0 5px 20px rgba(0,0,0,0.3);
        }
        .btn.google {
            background: linear-gradient(145deg, #db4a39, #c53727);
            box-shadow: 0 10px 0 #9a2c1f;
        }
        .btn.anonymous {
            background: linear-gradient(145deg, #34495e, #2c3e50);
            box-shadow: 0 10px 0 #1a252f;
        }
        .btn.secondary {
            background: linear-gradient(145deg, #34495e, #2c3e50);
            box-shadow: 0 10px 0 #1a252f;
        }
        .btn.small {
            font-size: 1.2rem;
            padding: 10px 15px;
        }
        .btn.disabled {
            background: linear-gradient(145deg, #7f8c8d, #95a5a6);
            box-shadow: 0 10px 0 #5d6d6e;
            pointer-events: none;
            opacity: 0.6;
            cursor: default;
        }
        .btn.disabled:active {
            transform: none;
            box-shadow: 0 10px 0 #5d6d6e;
        }
        .error-msg {
            color: #e74c3c;
            font-size: 1.2rem;
            margin: 10px 0;
            text-align: center;
        }
        .success-msg {
            color: #27ae60;
            font-size: 1.2rem;
            margin: 10px 0;
            text-align: center;
        }
        .user-info {
            font-size: 1.5rem;
            text-align: right;
            margin-bottom: 20px;
            color: #2c3e50;
        }
        .menu-btn {
            margin: 15px 0;
        }
        .toggle-link {
            color: #2980b9;
            cursor: pointer;
            text-decoration: underline;
            font-size: 1.2rem;
            margin-top: 10px;
            display: inline-block;
        }
        .hidden {
            display: none;
        }
        .scores-table {
            width: 100%;
            font-size: 1.6rem;
            border-collapse: collapse;
        }
        .scores-table th {
            background: rgba(0,0,0,0.1);
            padding: 10px;
        }
        .scores-table td {
            padding: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            text-align: center;
        }
        .settings-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 2rem;
            margin: 25px 0;
            background: rgba(255,255,255,0.3);
            padding: 15px 25px;
            border-radius: 60px;
        }
        .settings-item input[type="checkbox"] {
            width: 40px;
            height: 40px;
            transform: scale(1.5);
            accent-color: #e67e22;
        }
        .link-section {
            background: rgba(255,255,255,0.2);
            border-radius: 40px;
            padding: 20px;
            margin: 20px 0;
        }
        .separator {
            display: flex;
            align-items: center;
            text-align: center;
            color: #aaa;
            margin: 20px 0;
        }
        .separator::before,
        .separator::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #aaa;
        }
        .separator span {
            padding: 0 10px;
        }
    </style>
</head>
<body>
    <div id="bubbles-container"></div>
    <div class="glass-panel" id="app"></div>

    <script>
        // Firebase конфигурация
        const firebaseConfig = {
            apiKey: "AIzaSyAb0WLf9uyTXhs6eGw19i_42gUIZZCbP9c",
            authDomain: "bubble-shooter-game-6169e.firebaseapp.com",
            projectId: "bubble-shooter-game-6169e",
            storageBucket: "bubble-shooter-game-6169e.firebasestorage.app",
            messagingSenderId: "260116679476",
            appId: "1:260116679476:web:bf0b75316ce263d483f361"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;

        // Генерация пузырьков
        (function createBubbles() {
            const container = document.getElementById('bubbles-container');
            for (let i = 0; i < 15; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                const size = Math.random() * 100 + 30;
                bubble.style.width = size + 'px';
                bubble.style.height = size + 'px';
                bubble.style.left = Math.random() * 100 + '%';
                bubble.style.animationDelay = Math.random() * 5 + 's';
                bubble.style.animationDuration = Math.random() * 5 + 8 + 's';
                container.appendChild(bubble);
            }
        })();

        const appDiv = document.getElementById('app');

        // Экран входа
        function showLoginScreen(errorMsg = '', successMsg = '') {
            appDiv.innerHTML = `
                <h1>🍭 BUBBLE</h1>
                <div class="input-group">
                    <input type="email" id="email" placeholder="Email" />
                    <input type="password" id="password" placeholder="Пароль" />
                </div>
                <button class="btn" id="loginBtn">Войти с email</button>
                <button class="btn google" id="googleBtn">Войти через Google</button>
                <button class="btn anonymous" id="anonymousBtn">Войти как гость</button>
                ${errorMsg ? `<div class="error-msg">${errorMsg}</div>` : ''}
                ${successMsg ? `<div class="success-msg">${successMsg}</div>` : ''}
                <span class="toggle-link" id="toggleRegisterLink">Нет аккаунта? Зарегистрироваться</span>
            `;
            document.getElementById('loginBtn').addEventListener('click', loginWithEmail);
            document.getElementById('googleBtn').addEventListener('click', loginWithGoogle);
            document.getElementById('anonymousBtn').addEventListener('click', loginAnonymously);
            document.getElementById('toggleRegisterLink').addEventListener('click', () => showRegisterScreen());
        }

        // Экран регистрации
        function showRegisterScreen(errorMsg = '', successMsg = '') {
            appDiv.innerHTML = `
                <h1>🍭 Регистрация</h1>
                <div class="input-group">
                    <input type="email" id="regEmail" placeholder="Email" />
                    <input type="password" id="regPassword" placeholder="Пароль (минимум 6 символов)" />
                </div>
                <button class="btn" id="registerBtn">Зарегистрироваться</button>
                ${errorMsg ? `<div class="error-msg">${errorMsg}</div>` : ''}
                ${successMsg ? `<div class="success-msg">${successMsg}</div>` : ''}
                <span class="toggle-link" id="toggleLoginLink">Уже есть аккаунт? Войти</span>
            `;
            document.getElementById('registerBtn').addEventListener('click', registerWithEmail);
            document.getElementById('toggleLoginLink').addEventListener('click', () => showLoginScreen());
        }

        // Экран выбора имени (для новых пользователей) с кнопкой "Войти под своим аккаунтом"
        function showNameSetupScreen(errorMsg = '') {
            appDiv.innerHTML = `
                <h2>Выберите имя</h2>
                <div class="input-group">
                    <input type="text" id="setupName" placeholder="Имя (3-16 символов)" maxlength="16" minlength="3" />
                </div>
                <button class="btn" id="setupNameBtn">Продолжить</button>
                <div class="separator">
                    <span>или</span>
                </div>
                <button class="btn secondary" id="loginAccountBtn">Войти под своим аккаунтом</button>
                ${errorMsg ? `<div class="error-msg">${errorMsg}</div>` : ''}
            `;
            document.getElementById('setupNameBtn').addEventListener('click', handleNameSetup);
            document.getElementById('loginAccountBtn').addEventListener('click', () => {
                auth.signOut();
            });
        }

        // Функции аутентификации
        async function loginWithEmail() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            try {
                await auth.signInWithEmailAndPassword(email, password);
            } catch (error) {
                showLoginScreen(error.message);
            }
        }

        async function registerWithEmail() {
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            if (password.length < 6) {
                showRegisterScreen('Пароль должен быть минимум 6 символов');
                return;
            }
            try {
                await auth.createUserWithEmailAndPassword(email, password);
            } catch (error) {
                showRegisterScreen(error.message);
            }
        }

        async function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                await auth.signInWithPopup(provider);
            } catch (error) {
                showLoginScreen(error.message);
            }
        }

        async function loginAnonymously() {
            try {
                await auth.signInAnonymously();
            } catch (error) {
                showLoginScreen(error.message);
            }
        }

        // Слушатель состояния аутентификации
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const userRef = db.collection('users').doc(user.uid);
                const doc = await userRef.get();
                if (!doc.exists) {
                    let defaultName = user.displayName || user.email || 'Гость';
                    let uniqueName = defaultName;
                    let counter = 1;
                    while (true) {
                        const snap = await db.collection('users').where('name', '==', uniqueName).get();
                        if (snap.empty) break;
                        uniqueName = `${defaultName}${counter}`;
                        counter++;
                    }
                    const newUser = {
                        name: uniqueName,
                        settings: { music: true, sound: true },
                        highScore: 0,
                        endlessHighScore: 0,
                        campaignProgress: {},
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    await userRef.set(newUser);
                    currentUser = { id: user.uid, ...newUser };
                    showNameSetupScreen();
                } else {
                    currentUser = { id: user.uid, ...doc.data() };
                    if (currentUser.endlessHighScore === undefined) {
                        currentUser.endlessHighScore = 0;
                        await userRef.update({ endlessHighScore: 0 });
                    }
                    if (!currentUser.name || currentUser.name === 'Гость' || currentUser.name.includes('@')) {
                        showNameSetupScreen();
                    } else {
                        showMainMenu();
                    }
                }
            } else {
                currentUser = null;
                showLoginScreen();
            }
        });

        async function handleNameSetup() {
            const newName = document.getElementById('setupName').value.trim();
            if (newName.length < 3 || newName.length > 16) {
                showNameSetupScreen('Имя должно быть от 3 до 16 символов');
                return;
            }
            const snapshot = await db.collection('users').where('name', '==', newName).get();
            if (!snapshot.empty) {
                const otherUser = snapshot.docs.find(doc => doc.id !== currentUser.id);
                if (otherUser) {
                    showNameSetupScreen('Это имя уже занято, выберите другое');
                    return;
                }
            }
            await db.collection('users').doc(currentUser.id).update({ name: newName });
            currentUser.name = newName;
            showMainMenu();
        }

        // ГЛАВНОЕ МЕНЮ (кнопка "Рекорды" переименована в "Таблица лидеров")
        function showMainMenu() {
            appDiv.innerHTML = `
                <div class="user-info">👋 Привет, ${currentUser.name}</div>
                <button class="btn menu-btn disabled" id="campaignBtn">📚 Кампания</button>
                <button class="btn menu-btn secondary" id="endlessBtn">🏆 Рейтинговая игра</button>
                <button class="btn menu-btn secondary" id="recordsBtn">🥇 Таблица лидеров</button>
                <button class="btn menu-btn secondary" id="settingsBtn">⚙️ Настройки</button>
                <button class="btn secondary" id="logoutBtn" style="font-size:1.5rem; margin-top:30px;">🚪 Выйти</button>
            `;
            document.getElementById('endlessBtn').addEventListener('click', () => window.location.href = 'endless.html');
            document.getElementById('recordsBtn').addEventListener('click', showRecords);
            document.getElementById('settingsBtn').addEventListener('click', showSettings);
            document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut());
        }

        // ЭКРАН ТАБЛИЦЫ ЛИДЕРОВ (топ-5)
        async function showRecords() {
            const topSnapshot = await db.collection('users')
                .orderBy('endlessHighScore', 'desc')
                .limit(5) // теперь топ-5
                .get();
            let topRows = '';
            let rank = 1;
            topSnapshot.forEach(doc => {
                const data = doc.data();
                const name = data.name || 'Без имени';
                const score = data.endlessHighScore || 0;
                topRows += `<tr><td>${rank}</td><td>${name}</td><td>${score}</td></tr>`;
                rank++;
            });

            let userRow = '';
            if (currentUser) {
                const userScore = currentUser.endlessHighScore || 0;
                const betterCountSnapshot = await db.collection('users')
                    .where('endlessHighScore', '>', userScore)
                    .get();
                const betterCount = betterCountSnapshot.size;
                const userRank = betterCount + 1;

                if (userRank > 5) {
                    userRow = `
                        <tr style="border-top: 2px solid gold; background: rgba(255,215,0,0.1);">
                            <td>${userRank}</td>
                            <td>${currentUser.name}</td>
                            <td>${userScore}</td>
                        </tr>
                    `;
                }
            }

            appDiv.innerHTML = `
                <h2>🥇 Таблица лидеров (топ-5)</h2>
                <table class="scores-table">
                    <tr><th>Место</th><th>Имя</th><th>Счёт</th></tr>
                    ${topRows}
                    ${userRow}
                </table>
                <button class="btn secondary" id="backBtn">Назад</button>
            `;
            document.getElementById('backBtn').addEventListener('click', showMainMenu);
        }

        // ЭКРАН НАСТРОЕК
        async function showSettings() {
            const userRef = db.collection('users').doc(currentUser.id);
            const doc = await userRef.get();
            const settings = doc.data().settings || { music: true, sound: true };
            currentUser.settings = settings;

            const isAnonymous = auth.currentUser?.isAnonymous;

            let linkSectionHtml = '';
            if (isAnonymous) {
                linkSectionHtml = `
                    <div class="link-section">
                        <h3 style="font-size:1.8rem; margin-bottom:15px;">🔗 Привязать аккаунт</h3>
                        <p style="margin-bottom:15px;">Привяжите гостевой аккаунт, чтобы сохранить прогресс.</p>
                        <button class="btn google" id="linkGoogleBtn">Привязать Google</button>
                        <button class="btn email" id="linkEmailBtn">Привязать email и пароль</button>
                        <div id="linkEmailForm" style="display:none; margin-top:20px;">
                            <input type="email" id="linkEmail" placeholder="Email" />
                            <input type="password" id="linkPassword" placeholder="Пароль (минимум 6 символов)" />
                            <button class="btn" id="confirmLinkEmailBtn">Подтвердить</button>
                        </div>
                        <div id="linkError" class="error-msg"></div>
                    </div>
                `;
            }

            appDiv.innerHTML = `
                <h2>⚙️ Настройки</h2>
                <div class="input-group">
                    <label style="font-size:1.5rem;">Ваше имя:</label>
                    <input type="text" id="newName" value="${currentUser.name}" maxlength="16" minlength="3" />
                    <div id="nameStatus" class="error-msg" style="font-size:1rem;"></div>
                </div>
                ${linkSectionHtml}
                <button class="btn" id="saveSettingsBtn">Сохранить имя</button>
                <button class="btn secondary" id="backBtn">Назад</button>
            `;

            const nameInput = document.getElementById('newName');
            const nameStatus = document.getElementById('nameStatus');
            nameInput.addEventListener('input', async () => {
                const newName = nameInput.value.trim();
                if (newName.length < 3 || newName.length > 16) {
                    nameStatus.innerText = 'Имя должно быть от 3 до 16 символов';
                    return;
                }
                const snapshot = await db.collection('users').where('name', '==', newName).get();
                if (!snapshot.empty) {
                    const otherUser = snapshot.docs.find(doc => doc.id !== currentUser.id);
                    if (otherUser) {
                        nameStatus.innerText = '❌ Имя занято';
                    } else {
                        nameStatus.innerText = '✅ Имя свободно';
                    }
                } else {
                    nameStatus.innerText = '✅ Имя свободно';
                }
            });

            document.getElementById('saveSettingsBtn').addEventListener('click', async () => {
                const newName = nameInput.value.trim();
                if (newName.length < 3 || newName.length > 16) {
                    alert('Имя должно быть от 3 до 16 символов');
                    return;
                }
                const snapshot = await db.collection('users').where('name', '==', newName).get();
                if (!snapshot.empty) {
                    const otherUser = snapshot.docs.find(doc => doc.id !== currentUser.id);
                    if (otherUser) {
                        alert('Это имя уже занято, выберите другое');
                        return;
                    }
                }
                await db.collection('users').doc(currentUser.id).update({ name: newName });
                currentUser.name = newName;
                alert('Имя сохранено');
                showMainMenu();
            });

            document.getElementById('backBtn').addEventListener('click', showMainMenu);

            if (isAnonymous) {
                document.getElementById('linkGoogleBtn').addEventListener('click', async () => {
                    try {
                        const provider = new firebase.auth.GoogleAuthProvider();
                        await auth.currentUser.linkWithPopup(provider);
                        alert('Аккаунт привязан к Google');
                        showSettings();
                    } catch (error) {
                        document.getElementById('linkError').innerText = error.message;
                    }
                });
                document.getElementById('linkEmailBtn').addEventListener('click', () => {
                    document.getElementById('linkEmailForm').style.display = 'block';
                });
                document.getElementById('confirmLinkEmailBtn').addEventListener('click', async () => {
                    const email = document.getElementById('linkEmail').value.trim();
                    const password = document.getElementById('linkPassword').value;
                    if (password.length < 6) {
                        document.getElementById('linkError').innerText = 'Пароль минимум 6 символов';
                        return;
                    }
                    try {
                        const credential = firebase.auth.EmailAuthProvider.credential(email, password);
                        await auth.currentUser.linkWithCredential(credential);
                        alert('Аккаунт привязан к email');
                        showSettings();
                    } catch (error) {
                        document.getElementById('linkError').innerText = error.message;
                    }
                });
            }
        }
    </script>
</body>
  </html>
