<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bubble Shooter · Бесконечный режим</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', cursive, sans-serif;
        }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #ff9a9e, #fad0c4, #fad0c4);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: none;
            bottom: -100px;
            animation: rise 8s infinite ease-in;
        }
        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0.8; }
            100% { transform: translateY(-120vh) scale(1.5); opacity: 0; }
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3), inset 0 0 20px rgba(255, 255, 255, 0.5);
            padding: 20px 20px;
            width: 100%;
            max-width: 500px;
            color: #2c3e50;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.5);
        }
        .game-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 60px;
            padding: 15px 20px;
            margin-bottom: 15px;
            font-weight: bold;
            color: #2c3e50;
        }
        .header-score {
            font-size: 2.2rem;
            color: #f39c12;
        }
        .header-record {
            font-size: 1.5rem;
            color: #3498db;
        }
        .bomb-inventory {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.2);
            border-radius: 40px;
            padding: 10px 20px;
            margin-bottom: 10px;
            font-size: 1.3rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid transparent;
        }
        .bomb-inventory.active {
            border-color: #f1c40f;
            background: rgba(0,0,0,0.4);
        }
        .bomb-icon {
            font-size: 2rem;
        }
        .bomb-count {
            background: #e67e22;
            padding: 5px 12px;
            border-radius: 30px;
            font-weight: bold;
        }
        .bomb-progress {
            background: #34495e;
            padding: 5px 12px;
            border-radius: 30px;
        }
        .queue-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
        }
        .ball-item {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 4px solid #555;
            background: #ccc;
            transition: border 0.2s;
            background-size: cover;
            background-position: center;
        }
        .ball-item.current {
            border-color: #f1c40f;
            transform: scale(1.1);
        }
        canvas {
            background: transparent;
            border-radius: 30px;
            display: block;
            width: 100%;
            height: auto;
            border: 3px solid rgba(255,255,255,0.3);
            touch-action: none;
        }
        .btn {
            display: inline-block;
            width: 100%;
            padding: 12px 20px;
            font-size: 1.3rem;
            font-weight: bold;
            border: none;
            border-radius: 60px;
            background: linear-gradient(145deg, #f1c40f, #e67e22);
            color: white;
            text-shadow: 2px 2px 0 #b45d1a;
            box-shadow: 0 8px 0 #b45d1a;
            cursor: pointer;
            transition: 0.1s;
            margin-top: 15px;
        }
        .btn:active {
            transform: translateY(8px);
            box-shadow: none;
        }
        .btn.secondary {
            background: linear-gradient(145deg, #34495e, #2c3e50);
            box-shadow: 0 8px 0 #1a252f;
            text-shadow: 2px 2px 0 #1a252f;
        }
        .loading {
            text-align: center;
            font-size: 1.5rem;
            color: white;
            padding: 40px;
        }
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: gold;
            font-size: 2rem;
            padding: 20px 40px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 2px solid gold;
        }
        .toast.show {
            opacity: 1;
        }
        .toast-star {
            font-size: 4rem;
            animation: twinkle 0.5s infinite alternate;
        }
        @keyframes twinkle {
            from { transform: scale(1); text-shadow: 0 0 10px gold; }
            to { transform: scale(1.2); text-shadow: 0 0 20px orange; }
        }
    </style>
</head>
<body>
    <div id="bubbles-container"></div>
    <div class="glass-panel" id="app">
        <div class="loading">Загрузка бесконечного режима...</div>
    </div>
    <div id="toast" class="toast">
        <span class="toast-star">⭐</span>
        <span id="toastText"></span>
    </div>

    <script>
        // Firebase конфигурация
        const firebaseConfig = {
            apiKey: "AIzaSyAb0WLf9uyTXhs6eGw19i_42gUIZZCbP9c",
            authDomain: "bubble-shooter-game-6169e.firebaseapp.com",
            projectId: "bubble-shooter-game-6169e",
            storageBucket: "bubble-shooter-game-6169e.firebasestorage.app",
            messagingSenderId: "260116679476",
            appId: "1:260116679476:web:bf0b75316ce263d483f361"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;

        // Глобальные переменные игры
        let gameActive = false;
        let gameCanvas, ctx;
        let gameInterval;

        // Настройки сетки (staggered)
        const COLS = 9;
        const ROWS = 12;
        const BALL_RADIUS = 18;
        const CELL_W = BALL_RADIUS * 2;
        const CELL_H = BALL_RADIUS * 1.8;
        const X_OFFSET = BALL_RADIUS;
        // Соответствие цветов и имён файлов (без расширения)
        const COLOR_NAMES = {
            '#e67e22': 'orange',
            '#3498db': 'blue',
            '#2ecc71': 'green',
            '#e74c3c': 'red',
            '#9b59b6': 'purple'
        };
        const COLORS = Object.keys(COLOR_NAMES);

        // Загруженные изображения
        const ballImages = {};

        // Загружаем изображения для всех цветов
        function loadImages() {
            return new Promise((resolve) => {
                let loadedCount = 0;
                const total = COLORS.length;
                COLORS.forEach(color => {
                    const img = new Image();
                    const fileName = COLOR_NAMES[color] + '.png';
                    img.src = 'images/' + fileName;
                    img.onload = () => {
                        ballImages[color] = img;
                        loadedCount++;
                        if (loadedCount === total) resolve();
                    };
                    img.onerror = () => {
                        console.warn('Не удалось загрузить изображение:', fileName);
                        loadedCount++;
                        if (loadedCount === total) resolve();
                    };
                });
            });
        }

        const SHOTS_PER_NEW_ROW = 5;
        const MAX_TRAJECTORY_LENGTH = 300;
        const BOMB_THRESHOLD = 50; // шаров для получения бомбы

        let grid = [];
        let startOffset = 0;
        let shotsFired = 0;
        let ballQueue = [];
        let shooting = false;
        let ball = { active: false };

        // Анимированные умирающие шары
        let dyingBalls = [];

        let aiming = false;
        let aimX = 0, aimY = 0;

        let gameScore = 0;
        let gameCombo = 0;
        let currentRecord = 0;

        // Переменные для бомбы
        let bombCharge = 0;       // сколько шаров уничтожено в текущем цикле
        let bombsAvailable = 0;   // сколько бомб в инвентаре
        let bombActive = false;   // активна ли бомба для следующего выстрела

        const toast = document.getElementById('toast');
        const toastText = document.getElementById('toastText');

        function showToast(message) {
            toastText.innerText = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 1500);
        }

        function updateScoreDisplay() {
            const scoreEl = document.getElementById('scoreDisplay');
            if (scoreEl) scoreEl.innerText = gameScore;
        }

        function updateRecordDisplay() {
            const recordEl = document.getElementById('recordDisplay');
            if (recordEl) recordEl.innerText = currentRecord;
        }

        function updateBombUI() {
            const bombCountEl = document.getElementById('bombCount');
            const bombProgressEl = document.getElementById('bombProgress');
            const bombInventory = document.getElementById('bombInventory');
            if (bombCountEl) bombCountEl.innerText = bombsAvailable;
            if (bombProgressEl) bombProgressEl.innerText = `${bombCharge}/${BOMB_THRESHOLD}`;
            if (bombInventory) {
                if (bombActive) {
                    bombInventory.classList.add('active');
                } else {
                    bombInventory.classList.remove('active');
                }
            }
        }

        // Функция для добавления заряда бомбы (вызывается при уничтожении шаров)
        function addBombCharge(amount) {
            bombCharge += amount;
            while (bombCharge >= BOMB_THRESHOLD) {
                bombsAvailable++;
                bombCharge -= BOMB_THRESHOLD;
                showToast('💣 Получена бомба!');
            }
            updateBombUI();
        }

        // Функция взрыва бомбы в радиусе 3
        function explodeBomb(row, col) {
            // BFS для поиска всех шаров в радиусе 3 (по шагам сетки)
            const visited = Array(ROWS).fill().map(() => Array(COLS).fill(false));
            const queue = [{ r: row, c: col, dist: 0 }];
            const destroyed = [];
            visited[row][col] = true;

            while (queue.length) {
                const { r, c, dist } = queue.shift();
                if (dist > 3) continue; // ограничение радиуса

                if (grid[r][c] !== null) {
                    destroyed.push({ row: r, col: c, color: grid[r][c] });
                    grid[r][c] = null; // сразу удаляем
                }

                if (dist === 3) continue; // дальше не идём

                // Соседи (6 направлений)
                const offset = (r + startOffset) % 2;
                const neighbors = [
                    [r-1, c], [r+1, c], [r, c-1], [r, c+1]
                ];
                if (offset === 0) {
                    if (r > 0) {
                        neighbors.push([r-1, c-1]);
                        neighbors.push([r-1, c]);
                    }
                    if (r < ROWS-1) {
                        neighbors.push([r+1, c-1]);
                        neighbors.push([r+1, c]);
                    }
                } else {
                    if (r > 0) {
                        neighbors.push([r-1, c]);
                        neighbors.push([r-1, c+1]);
                    }
                    if (r < ROWS-1) {
                        neighbors.push([r+1, c]);
                        neighbors.push([r+1, c+1]);
                    }
                }

                for (let [nr, nc] of neighbors) {
                    if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && !visited[nr][nc]) {
                        visited[nr][nc] = true;
                        queue.push({ r: nr, c: nc, dist: dist + 1 });
                    }
                }
            }
            return destroyed;
        }

        (function createBubbles() {
            const container = document.getElementById('bubbles-container');
            for (let i = 0; i < 15; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                const size = Math.random() * 100 + 30;
                bubble.style.width = size + 'px';
                bubble.style.height = size + 'px';
                bubble.style.left = Math.random() * 100 + '%';
                bubble.style.animationDelay = Math.random() * 5 + 's';
                bubble.style.animationDuration = Math.random() * 5 + 8 + 's';
                container.appendChild(bubble);
            }
        })();

        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            const userRef = db.collection('users').doc(user.uid);
            const doc = await userRef.get();
            if (!doc.exists) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = { id: user.uid, ...doc.data() };
            if (currentUser.endlessHighScore === undefined) {
                currentUser.endlessHighScore = 0;
                await userRef.update({ endlessHighScore: 0 });
            }
            currentRecord = currentUser.endlessHighScore || 0;
            await loadImages();
            initGame();
        });

        function initGame() {
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = `
                <div class="game-header">
                    <div class="header-score" id="scoreDisplay">0</div>
                    <div class="header-record">🏆 Рекорд: <span id="recordDisplay">${currentRecord}</span></div>
                </div>
                <div class="bomb-inventory" id="bombInventory">
                    <span class="bomb-icon">💣</span>
                    <span class="bomb-count" id="bombCount">0</span>
                    <span class="bomb-progress" id="bombProgress">0/${BOMB_THRESHOLD}</span>
                </div>
                <canvas id="gameCanvas" width="360" height="440"></canvas>
                <div class="queue-container" id="queueContainer"></div>
                <button class="btn secondary" id="exitBtn">Выйти в меню</button>
            `;

            gameCanvas = document.getElementById('gameCanvas');
            ctx = gameCanvas.getContext('2d');

            initGrid();
            initQueue();
            updateQueueDisplay();
            updateScoreDisplay();
            updateBombUI();

            // Обработчик клика по инвентарю для активации бомбы
            document.getElementById('bombInventory').addEventListener('click', () => {
                if (bombsAvailable > 0) {
                    bombActive = !bombActive; // переключаем активность
                    updateBombUI();
                }
            });

            gameActive = true;
            gameInterval = setInterval(updateGame, 1000 / 60);

            setupControls();

            document.getElementById('exitBtn').addEventListener('click', () => {
                stopGame();
                window.location.href = 'index.html';
            });
        }

        function initGrid() {
            grid = [];
            for (let r = 0; r < ROWS; r++) {
                grid[r] = Array(COLS).fill(null);
            }
            for (let r = 0; r < 3; r++) {
                for (let c = 0; c < COLS; c++) {
                    grid[r][c] = COLORS[Math.floor(Math.random() * COLORS.length)];
                }
            }
            startOffset = 0;
            shotsFired = 0;
            gameScore = 0;
            gameCombo = 0;
            dyingBalls = [];
            bombCharge = 0;
            bombsAvailable = 0;
            bombActive = false;
        }

        function initQueue() {
            ballQueue = [];
            for (let i = 0; i < 3; i++) {
                ballQueue.push(COLORS[Math.floor(Math.random() * COLORS.length)]);
            }
        }

        function updateQueueDisplay() {
            const container = document.getElementById('queueContainer');
            if (!container) return;
            container.innerHTML = ballQueue.map((color, index) => {
                const img = ballImages[color];
                const bgStyle = img ? `url(${img.src})` : color;
                return `
                    <div class="ball-item ${index === 0 ? 'current' : ''}" style="background: ${bgStyle}; background-size: cover; background-position: center;"></div>
                `;
            }).join('');
        }

        function shiftQueue() {
            ballQueue.shift();
            ballQueue.push(COLORS[Math.floor(Math.random() * COLORS.length)]);
            updateQueueDisplay();
        }

        function getBallXY(row, col) {
            const offset = (row + startOffset) % 2;
            const x = col * CELL_W + offset * X_OFFSET + BALL_RADIUS;
            const y = row * CELL_H + BALL_RADIUS + 15;
            return { x, y };
        }

        function findNearestFreeCell(x, y) {
            let minDist = Infinity;
            let best = null;
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (grid[r][c] !== null) continue;
                    const { x: cx, y: cy } = getBallXY(r, c);
                    const d = Math.hypot(x - cx, y - cy);
                    if (d < minDist) {
                        minDist = d;
                        best = { row: r, col: c };
                    }
                }
            }
            return best;
        }

        function predictTrajectory(startX, startY, vx, vy) {
            let points = [];
            let x = startX, y = startY;
            let dx = vx, dy = vy;
            let traveled = 0;
            let maxIter = 100;

            while (traveled < MAX_TRAJECTORY_LENGTH && maxIter-- > 0) {
                let tLeft = dx < 0 ? (BALL_RADIUS - x) / dx : Infinity;
                let tRight = dx > 0 ? (gameCanvas.width - BALL_RADIUS - x) / dx : Infinity;
                let tTop = dy < 0 ? (BALL_RADIUS - y) / dy : Infinity;

                let tWall = Math.min(tLeft, tRight, tTop);
                if (tWall === Infinity) break;

                let newX = x + dx * tWall;
                let newY = y + dy * tWall;
                let segmentLength = Math.hypot(newX - x, newY - y);

                if (traveled + segmentLength > MAX_TRAJECTORY_LENGTH) {
                    let fraction = (MAX_TRAJECTORY_LENGTH - traveled) / segmentLength;
                    newX = x + dx * tWall * fraction;
                    newY = y + dy * tWall * fraction;
                    points.push({ x: newX, y: newY });
                    break;
                }

                points.push({ x: newX, y: newY });
                traveled += segmentLength;

                if (tWall === tLeft || tWall === tRight) dx = -dx;
                else if (tWall === tTop) dy = -dy;

                x = newX;
                y = newY;
            }
            return points;
        }

        function checkCollision(ballX, ballY, vx, vy) {
            if (ballX - BALL_RADIUS < 0) return { type: 'wall', side: 'left', newVx: Math.abs(vx) };
            if (ballX + BALL_RADIUS > gameCanvas.width) return { type: 'wall', side: 'right', newVx: -Math.abs(vx) };
            if (ballY - BALL_RADIUS < 0) return { type: 'ceiling', x: ballX, y: ballY };

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (grid[r][c] === null) continue;
                    const { x: cx, y: cy } = getBallXY(r, c);
                    const dist = Math.hypot(ballX - cx, ballY - cy);
                    if (dist < 2 * BALL_RADIUS - 2) {
                        return { type: 'ball', row: r, col: c, x: cx, y: cy };
                    }
                }
            }
            return null;
        }

        function findCluster(row, col, color) {
            if (!grid[row]?.[col] || grid[row][col] !== color) return [];
            const visited = Array(ROWS).fill().map(() => Array(COLS).fill(false));
            const queue = [[row, col]];
            const cluster = [];
            while (queue.length) {
                const [r, c] = queue.shift();
                if (visited[r][c]) continue;
                visited[r][c] = true;
                if (grid[r][c] === color) {
                    cluster.push([r, c]);
                    const offset = (r + startOffset) % 2;
                    const neighbors = [
                        [r-1, c], [r+1, c], [r, c-1], [r, c+1]
                    ];
                    if (offset === 0) {
                        if (r > 0) {
                            neighbors.push([r-1, c-1]);
                            neighbors.push([r-1, c]);
                        }
                        if (r < ROWS-1) {
                            neighbors.push([r+1, c-1]);
                            neighbors.push([r+1, c]);
                        }
                    } else {
                        if (r > 0) {
                            neighbors.push([r-1, c]);
                            neighbors.push([r-1, c+1]);
                        }
                        if (r < ROWS-1) {
                            neighbors.push([r+1, c]);
                            neighbors.push([r+1, c+1]);
                        }
                    }
                    for (let [nr, nc] of neighbors) {
                        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && !visited[nr][nc] && grid[nr][nc] === color) {
                            queue.push([nr, nc]);
                        }
                    }
                }
            }
            return cluster;
        }

        function removeFloating() {
            const visited = Array(ROWS).fill().map(() => Array(COLS).fill(false));
            const queue = [];

            for (let c = 0; c < COLS; c++) {
                if (grid[0][c] !== null) {
                    queue.push([0, c]);
                    visited[0][c] = true;
                }
            }

            while (queue.length) {
                const [r, c] = queue.shift();
                const offset = (r + startOffset) % 2;
                const neighbors = [
                    [r-1, c], [r+1, c], [r, c-1], [r, c+1]
                ];
                if (offset === 0) {
                    if (r > 0) {
                        neighbors.push([r-1, c-1]);
                        neighbors.push([r-1, c]);
                    }
                    if (r < ROWS-1) {
                        neighbors.push([r+1, c-1]);
                        neighbors.push([r+1, c]);
                    }
                } else {
                    if (r > 0) {
                        neighbors.push([r-1, c]);
                        neighbors.push([r-1, c+1]);
                    }
                    if (r < ROWS-1) {
                        neighbors.push([r+1, c]);
                        neighbors.push([r+1, c+1]);
                    }
                }
                for (let [nr, nc] of neighbors) {
                    if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && !visited[nr][nc] && grid[nr][nc] !== null) {
                        visited[nr][nc] = true;
                        queue.push([nr, nc]);
                    }
                }
            }

            let removed = [];
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (grid[r][c] !== null && !visited[r][c]) {
                        removed.push({ row: r, col: c, color: grid[r][c] });
                        grid[r][c] = null;
                    }
                }
            }
            return removed;
        }

        function addNewRow() {
            for (let r = ROWS - 1; r > 0; r--) {
                grid[r] = [...grid[r-1]];
            }
            grid[0] = Array(COLS).fill(null).map(() => COLORS[Math.floor(Math.random() * COLORS.length)]);
            startOffset = 1 - startOffset;
        }

        function addDyingBalls(balls) {
            const now = performance.now();
            balls.forEach(b => {
                const { row, col, color } = b;
                const { x, y } = getBallXY(row, col);
                dyingBalls.push({
                    x, y,
                    color,
                    startTime: now,
                    duration: 800
                });
            });
        }

        async function processShot(targetRow, targetCol, ball) {
            if (targetRow === null || targetCol === null) return 0;

            let totalDestroyed = 0;
            let pointsEarned = 0;
            let destroyedBalls = [];

            if (ball.isBomb) {
                // Взрыв бомбы
                destroyedBalls = explodeBomb(targetRow, targetCol);
                totalDestroyed = destroyedBalls.length;
                pointsEarned = totalDestroyed * 10;
                // Добавляем анимацию для уничтоженных шаров
                if (destroyedBalls.length > 0) {
                    addDyingBalls(destroyedBalls);
                }
                // Увеличиваем заряд бомбы на количество уничтоженных шаров
                addBombCharge(totalDestroyed);
            } else {
                // Обычный шар
                grid[targetRow][targetCol] = ball.color;

                const cluster = findCluster(targetRow, targetCol, ball.color);
                if (cluster.length >= 3) {
                    cluster.forEach(([r, c]) => {
                        destroyedBalls.push({ row: r, col: c, color: grid[r][c] });
                        grid[r][c] = null;
                        totalDestroyed++;
                        pointsEarned += 10;
                    });
                }

                const floating = removeFloating();
                floating.forEach(item => {
                    destroyedBalls.push(item);
                    totalDestroyed++;
                    pointsEarned += 10;
                });

                if (destroyedBalls.length > 0) {
                    addDyingBalls(destroyedBalls);
                }

                // Увеличиваем заряд бомбы
                addBombCharge(totalDestroyed);
            }

            if (totalDestroyed > 0) {
                gameCombo++;
                gameScore += pointsEarned * gameCombo;
            } else {
                gameCombo = 0;
            }

            updateScoreDisplay();

            // Проверка поражения
            for (let c = 0; c < COLS; c++) {
                if (grid[ROWS-1][c] !== null) {
                    if (gameScore > currentRecord) {
                        currentRecord = gameScore;
                        await db.collection('users').doc(currentUser.id).update({
                            endlessHighScore: currentRecord
                        });
                        updateRecordDisplay();
                        showToast(`🏆 Новый рекорд: ${currentRecord}!`);
                    } else {
                        showToast('Игра окончена');
                    }
                    setTimeout(() => {
                        stopGame();
                        window.location.href = 'index.html';
                    }, 1500);
                    return;
                }
            }

            return totalDestroyed;
        }

        function shoot(dx, dy) {
            if (shooting || !gameActive) return;
            const len = Math.hypot(dx, dy);
            if (len < 0.001) return;
            const speed = 5;

            if (bombActive && bombsAvailable > 0) {
                // Выстрел бомбой
                ball = {
                    x: gameCanvas.width / 2,
                    y: gameCanvas.height - 40,
                    vx: (dx / len) * speed,
                    vy: (dy / len) * speed,
                    isBomb: true,
                    active: true
                };
                bombsAvailable--;
                bombActive = false;
                updateBombUI();
                shooting = true;
                // Очередь не сдвигается
            } else {
                // Обычный выстрел
                ball = {
                    x: gameCanvas.width / 2,
                    y: gameCanvas.height - 40,
                    vx: (dx / len) * speed,
                    vy: (dy / len) * speed,
                    color: ballQueue[0],
                    isBomb: false,
                    active: true
                };
                shooting = true;
                shiftQueue();
            }
        }

        function updateGame() {
            if (!gameActive) return;

            const now = performance.now();
            dyingBalls = dyingBalls.filter(b => now - b.startTime < b.duration);

            if (shooting && ball.active) {
                ball.x += ball.vx;
                ball.y += ball.vy;

                const collision = checkCollision(ball.x, ball.y, ball.vx, ball.vy);
                if (collision) {
                    if (collision.type === 'wall') {
                        ball.vx = collision.newVx;
                    } else if (collision.type === 'ceiling') {
                        const cell = findNearestFreeCell(ball.x, ball.y);
                        ball.active = false;
                        shooting = false;
                        if (cell) {
                            processShot(cell.row, cell.col, ball);
                            shotsFired++;
                            if (shotsFired >= SHOTS_PER_NEW_ROW) {
                                addNewRow();
                                shotsFired = 0;
                            }
                        }
                    } else if (collision.type === 'ball') {
                        const cell = findNearestFreeCell(ball.x, ball.y);
                        ball.active = false;
                        shooting = false;
                        if (cell) {
                            processShot(cell.row, cell.col, ball);
                            shotsFired++;
                            if (shotsFired >= SHOTS_PER_NEW_ROW) {
                                addNewRow();
                                shotsFired = 0;
                            }
                        }
                    }
                }
                if (ball.y - BALL_RADIUS > gameCanvas.height) {
                    ball.active = false;
                    shooting = false;
                }
            }

            drawGame();
        }

        function drawGame() {
            ctx.clearRect(0, 0, gameCanvas.width, gameCanvas.height);

            if (aiming && !shooting && gameActive) {
                const startX = gameCanvas.width / 2;
                const startY = gameCanvas.height - 40;
                const dx = aimX - startX;
                const dy = aimY - startY;
                const len = Math.hypot(dx, dy);
                if (len > 0.001) {
                    const vx = (dx / len) * 5;
                    const vy = (dy / len) * 5;
                    const points = predictTrajectory(startX, startY, vx, vy);
                    if (points.length > 0) {
                        ctx.beginPath();
                        ctx.moveTo(startX, startY);
                        for (let p of points) {
                            ctx.lineTo(p.x, p.y);
                        }
                        ctx.strokeStyle = '#555';
                        ctx.lineWidth = 2;
                        ctx.setLineDash([5, 5]);
                        ctx.stroke();
                        ctx.setLineDash([]);
                    }
                }
            }

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (grid[r][c]) {
                        const { x, y } = getBallXY(r, c);
                        const img = ballImages[grid[r][c]];
                        if (img) {
                            ctx.drawImage(img, x - BALL_RADIUS, y - BALL_RADIUS, BALL_RADIUS*2, BALL_RADIUS*2);
                        } else {
                            ctx.beginPath();
                            ctx.arc(x, y, BALL_RADIUS-1, 0, 2*Math.PI);
                            ctx.fillStyle = grid[r][c];
                            ctx.shadowColor = '#fff3';
                            ctx.shadowBlur = 8;
                            ctx.fill();
                            ctx.shadowBlur = 0;
                            ctx.strokeStyle = '#000';
                            ctx.lineWidth = 1.5;
                            ctx.stroke();
                        }
                    }
                }
            }

            const now = performance.now();
            dyingBalls.forEach(b => {
                const elapsed = now - b.startTime;
                const progress = Math.min(elapsed / b.duration, 1);
                const radius = BALL_RADIUS * (1 - progress * 0.8);
                const alpha = 1 - progress;
                const img = ballImages[b.color];
                if (img) {
                    ctx.globalAlpha = alpha;
                    ctx.drawImage(img, b.x - radius, b.y - radius, radius*2, radius*2);
                    ctx.globalAlpha = 1.0;
                } else {
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, radius, 0, 2*Math.PI);
                    ctx.fillStyle = b.color;
                    ctx.globalAlpha = alpha;
                    ctx.shadowBlur = 8;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    ctx.globalAlpha = 1.0;
                }
            });

            const cannonX = gameCanvas.width / 2;
            const cannonY = gameCanvas.height - 40;
            ctx.fillStyle = '#456';
            ctx.beginPath();
            ctx.moveTo(cannonX - 18, cannonY - 10);
            ctx.lineTo(cannonX + 18, cannonY - 10);
            ctx.lineTo(cannonX, cannonY + 10);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#789';
            ctx.lineWidth = 2;
            ctx.stroke();

            if (ball.active) {
                if (ball.isBomb) {
                    // Рисуем бомбу (красный круг с иконкой)
                    ctx.beginPath();
                    ctx.arc(ball.x, ball.y, BALL_RADIUS-1, 0, 2*Math.PI);
                    ctx.fillStyle = '#222';
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = '#ff4444';
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = '#ff0000';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    ctx.font = 'bold 20px monospace';
                    ctx.fillStyle = 'white';
                    ctx.fillText('💣', ball.x - 15, ball.y + 8);
                } else {
                    const img = ballImages[ball.color];
                    if (img) {
                        ctx.drawImage(img, ball.x - BALL_RADIUS, ball.y - BALL_RADIUS, BALL_RADIUS*2, BALL_RADIUS*2);
                    } else {
                        ctx.beginPath();
                        ctx.arc(ball.x, ball.y, BALL_RADIUS-1, 0, 2*Math.PI);
                        ctx.fillStyle = ball.color;
                        ctx.shadowBlur = 12;
                        ctx.shadowColor = '#fff9';
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                }
            }
        }

        function stopGame() {
            gameActive = false;
            clearInterval(gameInterval);
        }

        function setupControls() {
            function handleStart(e) {
                e.preventDefault();
                if (!gameActive) return;
                const rect = gameCanvas.getBoundingClientRect();
                const scaleX = gameCanvas.width / rect.width;
                const scaleY = gameCanvas.height / rect.height;
                let clientX, clientY;
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                aimX = (clientX - rect.left) * scaleX;
                aimY = (clientY - rect.top) * scaleY;
                aiming = true;
            }

            function handleMove(e) {
                if (!aiming || !gameActive) return;
                e.preventDefault();
                const rect = gameCanvas.getBoundingClientRect();
                const scaleX = gameCanvas.width / rect.width;
                const scaleY = gameCanvas.height / rect.height;
                let clientX, clientY;
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                aimX = (clientX - rect.left) * scaleX;
                aimY = (clientY - rect.top) * scaleY;
            }

            function handleEnd(e) {
                if (!aiming || !gameActive) return;
                e.preventDefault();
                aiming = false;
                const cannonX = gameCanvas.width / 2;
                const cannonY = gameCanvas.height - 40;
                const dx = aimX - cannonX;
                const dy = aimY - cannonY;
                shoot(dx, dy);
            }

            gameCanvas.addEventListener('mousedown', handleStart);
            gameCanvas.addEventListener('mousemove', handleMove);
            gameCanvas.addEventListener('mouseup', handleEnd);
            gameCanvas.addEventListener('mouseleave', () => { aiming = false; });
            gameCanvas.addEventListener('touchstart', handleStart, { passive: false });
            gameCanvas.addEventListener('touchmove', handleMove, { passive: false });
            gameCanvas.addEventListener('touchend', handleEnd, { passive: false });
            gameCanvas.addEventListener('touchcancel', () => { aiming = false; });
        }
    </script>
